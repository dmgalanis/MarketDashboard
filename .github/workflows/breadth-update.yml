name: Update Breadth Baseline

on:
  schedule:
    # Run at 00:30 UTC (8:30 PM ET / 5:30 PM PT) — after US market close
    - cron: '30 0 * * 1-6'   # Mon-Sat (covers Mon-Fri market days + Sunday night for clean Monday open)
  workflow_dispatch:          # Allow manual trigger from GitHub UI

permissions:
  contents: write             # Needed to push the updated JSON file

jobs:
  update-baseline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run breadth computation
        env:
          ALPACA_KEY_ID: ${{ secrets.ALPACA_KEY_ID }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
        run: python compute_breadth.py

      - name: Commit and push updated baseline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add breadth_baseline.json
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "Update breadth baseline $(date -u +%Y-%m-%d)"
          git push
