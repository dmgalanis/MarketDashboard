    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            /* Lock to viewport — no bounce scroll on iOS */
            height: 100%;
            overflow: hidden;
        }

        /* ── Main scroll container ── */
        #appRoot {
            height: 100dvh;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            /* Respect notches/home bar */
            padding-top: env(safe-area-inset-top, 0px);
            padding-bottom: env(safe-area-inset-bottom, 0px);
            padding-left: env(safe-area-inset-left, 0px);
            padding-right: env(safe-area-inset-right, 0px);
        }

        /* When main panel fits on screen we don't want scroll at all */
        #appRoot.no-scroll { overflow: hidden; }

        .tm-banner { position: relative; overflow: hidden; }
        .tm-banner::before { content: ''; position: absolute; inset: 0; opacity: 0.12; background: linear-gradient(135deg, transparent 20%, rgba(255,255,255,0.4) 40%, rgba(255,255,255,0.1) 45%, transparent 65%); pointer-events: none; }
        .tm-banner::after { content: ''; position: absolute; inset: 0; opacity: 0.06; background: radial-gradient(ellipse at 30% 0%, rgba(255,255,255,0.8) 0%, transparent 60%); pointer-events: none; }
        .tm-orb { position: relative; border-radius: 50%; }
        .tm-orb::before { content: ''; position: absolute; top: 15%; left: 20%; width: 35%; height: 30%; border-radius: 50%; background: rgba(255,255,255,0.45); filter: blur(1px); }
        @keyframes tm-shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .tm-shimmer { background-size: 200% 100%; animation: tm-shimmer 3s ease-in-out infinite; }
        .hidden { display: none !important; }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        input[type="text"], input[type="password"], input[type="number"] { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; border-radius: 6px; padding: 6px 10px; font-size: 13px; outline: none; }
        input:focus { border-color: #3b82f6; }
        .config-section { background: rgba(30,41,59,0.5); border: 1px solid #1e293b; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        /* Hardcoded API keys — no key entry UI needed */

        /* ── Expanded chart modal ── */
        #breadthExpandedModal {
            position: fixed;
            inset: 0;
            z-index: 110;
            background: rgba(2, 6, 23, 0.97);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            /* safe areas so nothing clips behind notch/home indicator */
            padding-top: env(safe-area-inset-top, 0px);
            padding-bottom: env(safe-area-inset-bottom, 0px);
            padding-left: env(safe-area-inset-left, 0px);
            padding-right: env(safe-area-inset-right, 0px);
        }

        /* Header row stays at natural height */
        #expandedChartHeader {
            flex: 0 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            border-bottom: 1px solid #1e293b;
            min-height: 52px;
        }

        /* Zoom bar */
        #expandedChartZoom {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-bottom: 1px solid rgba(30,41,59,0.5);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        #expandedChartZoom::-webkit-scrollbar { display: none; }

        /* Chart fills remaining space — key to landscape responsiveness */
        #expandedChartArea {
            flex: 1 1 0;
            position: relative;
            overflow: hidden;
            min-height: 0; /* critical flex fix */
        }

        /* Tooltip inside chart modal */
        #expandedChartTooltip {
            position: absolute;
            z-index: 10;
            background: rgba(15,23,42,0.95);
            border: 1px solid #475569;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 10px;
            font-family: monospace;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            pointer-events: none;
            min-width: 160px;
        }

        /* Landscape-specific compact header */
        @media (orientation: landscape) and (max-height: 500px) {
            #expandedChartHeader {
                min-height: 40px;
                padding: 6px 12px;
            }
            #expandedChartHeader .chart-title-text { font-size: 11px; }
            #expandedChartHeader .chart-val-text { font-size: 14px; }
            #expandedChartZoom {
                padding: 4px 12px;
            }
            #expandedChartZoom button {
                padding: 3px 10px;
                font-size: 9px;
            }
        }

        /* Animate-spin polyfill for Lucide loader */
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body>
<div id="appRoot">
    <div class="max-w-lg mx-auto px-3 py-3" id="mainContent">
        <!-- Header -->
        <div class="flex items-center justify-between mb-4">
            <div>
                <h1 class="text-lg font-black text-white tracking-tight">Trend M.A.P.<span class="text-[10px] font-normal text-slate-500 align-super ml-0.5">©</span></h1>
                <div class="text-[10px] text-slate-500 uppercase tracking-widest">Market Action Pulse</div>
            </div>
            <button onclick="app.toggleConfig()" class="p-2 rounded-lg bg-slate-800 border border-slate-700 text-slate-400 hover:text-white transition-colors" title="Settings">
                <i data-lucide="settings" class="w-4 h-4"></i>
            </button>
        </div>

        <!-- Config Panel (hidden by default) -->
        <div id="configPanel" class="hidden mb-4">
            <div class="config-section">
                <div class="text-[9px] text-slate-500 uppercase font-bold tracking-wider mb-2">Data</div>
                <div class="flex gap-2">
                    <button onclick="app.clearAllData()" class="text-[10px] text-red-400 hover:text-red-300 transition-colors">Clear All Data</button>
                </div>
            </div>
        </div>

        <!-- Main Trend MAP Panel -->
        <div id="trendMapPanel"></div>
    </div><!-- /mainContent -->
</div><!-- /appRoot -->

    <!-- Modals render here -->

    <script>
    // =========================================================================
    // STANDALONE TREND M.A.P. APPLICATION
    // =========================================================================
    const app = {
        // --- PERSISTENT STATE ---
        data: { settings: {} },

        async init() {
            // Load from localStorage
            try {
                const saved = localStorage.getItem('trendmap_data');
                if (saved) this.data = JSON.parse(saved);
            } catch(e) { console.warn('Failed to load saved data:', e); }

            if (!this.data.settings) this.data.settings = {};

            this.initTrendMap();
            this.initBreadth();

            // Render immediately with whatever state we have (may be grey)
            this.renderTrendMap();
            lucide.createIcons();

            // Always fetch the baseline on startup — it's a static JSON file and
            // requires no API keys. Once loaded, recompute McClellan signals and
            // re-render so the detail view has the full history on first open.
            await this._loadBaselineOnStartup();
        },

        async _loadBaselineOnStartup() {
            const bd = this.data.settings.breadthData;
            if (!bd) return;

            // Skip if already loaded in this session (e.g. user already clicked Refresh)
            if (bd.baselineLoaded && bd.baseline) return;

            try {
                const baseline = await this._fetchBaseline();
                if (!baseline) return;

                bd.baseline = baseline;
                bd.baselineLoaded = true;

                // Seed adHistory from the baseline's recent history so incremental
                // McClellan calculation has the correct starting EMA state
                if (baseline.adHistory && baseline.adHistory.length) {
                    // Merge: keep any live entries newer than the baseline end date,
                    // but seed with the baseline's adHistory as the foundation
                    const baselineEnd = baseline.lastState?.date || '';
                    const liveNewer = (bd.adHistory || []).filter(d => d.date > baselineEnd);
                    bd.adHistory = [...baseline.adHistory, ...liveNewer];
                }

                // Seed H/L history if the baseline provides it (version 3+)
                if (baseline.hlHistory && baseline.hlHistory.length && !bd.netHighLowHistory.length) {
                    bd.netHighLowHistory = baseline.hlHistory.slice();
                }

                // Recompute McClellan from the now-loaded baseline
                this._computeMcClellan();
                this._computeNetHighLowSignal();

                // Re-render so charts and signal values reflect the full history
                this.renderTrendMap();
                lucide.createIcons();
            } catch (e) {
                console.warn('Startup baseline load failed:', e);
            }
        },

        save() {
            try {
                // Don't persist the large baseline
                const bd = this.data.settings.breadthData;
                let baselineRef = null;
                if (bd) { baselineRef = bd.baseline; bd.baseline = null; }
                localStorage.setItem('trendmap_data', JSON.stringify(this.data));
                if (bd && baselineRef) bd.baseline = baselineRef;
            } catch(e) { console.warn('Save failed:', e); }
        },

        saveConfig() {
            // Keys are hardcoded — nothing to save
        },

        toggleConfig() {
            const p = document.getElementById('configPanel');
            if (p) p.classList.toggle('hidden');
        },

        clearAllData() {
            if (!confirm('Clear all Trend MAP data?')) return;
            localStorage.removeItem('trendmap_data');
            location.reload();
        },

        // =====================================================================
        // TREND MAP DATA MODEL
        // =====================================================================
        _trendMapDefaults() {
            return {
                signals: {
                    p1_above_rising_5sma: null,
                    p2_daily_buy_signal: null,
                    p3_weekly_buy_signal: null,
                    p4_traction: null,
                    p5_mcsi_uptrend: null,
                    p6_net_52wk_positive: null,
                    p7_mco_out_overbought: null
                },
                overrides: { p1: null, p2: null, p3: null, p4: null, p5: null, p6: null, p7: null },
                tractionConfig: {
                    minGainers: 2,
                    lookback: 4,
                    minGainPct: 2
                },
                exposureRules: {
                    GREEN: 'Build to full exposure progressively. Option to use margin when trades are working and gaining cushion.',
                    YELLOW: 'If coming from cash build to Max ~50% exposure, no further unless existing exposure fully financed. If green moves to yellow, move stops up, take trims. New trades only as current ones gain cushion.',
                    AMBER: 'Test ONE trade only. Added exposure ONLY after initial risk is fully financed. Close if negative by EOD.',
                    ORANGE: 'Absolutely NO new trades. Protect principal and gains. Tighten all stops.',
                    RED: '100% Cash or Short. Exit the market by manually selling positions or allowing them to hit trailing stops. Hard stops at final levels are critical.'
                },
                lastFetch: null,
                priceCache: null
            };
        },

        initTrendMap() {
            if (!this.data.settings.trendMap) {
                this.data.settings.trendMap = this._trendMapDefaults();
            }
            const defaults = this._trendMapDefaults();
            const tm = this.data.settings.trendMap;
            if (!tm.signals) tm.signals = defaults.signals;
            if (!tm.overrides) tm.overrides = defaults.overrides;
            if (!tm.tractionConfig) tm.tractionConfig = defaults.tractionConfig;
            if (!tm.exposureRules) tm.exposureRules = defaults.exposureRules;
            if (tm.tractionConfig.minWinRate !== undefined) {
                tm.tractionConfig = defaults.tractionConfig;
            }
        },

        // =====================================================================
        // SIGNAL RESOLUTION
        // =====================================================================
        // Signal mapping: Point 1=MCSI, 2=5SMA, 3=Daily, 4=Weekly, 5=Traction, 6=52wHL, 7=MCO
        getTrendMapSignal(pointNum) {
            const tm = this.data.settings.trendMap;
            const key = `p${pointNum}`;
            const signalKeys = [
                'p5_mcsi_uptrend',          // Point 1: MCSI Uptrend
                'p1_above_rising_5sma',     // Point 2: QQQE Above Rising 5 SMA
                'p2_daily_buy_signal',      // Point 3: Daily Buy Signal
                'p3_weekly_buy_signal',     // Point 4: Weekly Buy Signal
                'p4_traction',              // Point 5: Gained Traction
                'p6_net_52wk_positive',     // Point 6: Net 52-Week H/L
                'p7_mco_out_overbought'     // Point 7: MCO Out of Overbought
            ];
            if (tm.overrides[key] !== null && tm.overrides[key] !== undefined) return tm.overrides[key];
            const computed = tm.signals[signalKeys[pointNum - 1]];
            if (computed === true) return 'YES';
            if (computed === false) return 'NO';
            if (computed === 'ATTEMPT') return 'ATTEMPT';
            return null;
        },

        getTrendMapColour() {
            const signals = [];
            for (let i = 1; i <= 7; i++) signals.push(this.getTrendMapSignal(i));

            const mcsi = signals[0];           // Signal 1 — pivot
            const group = signals.slice(1, 5); // Signals 2–5 — group
            const allGroupYes = group.every(s => s === 'YES');
            const allGroupNo  = group.every(s => s === 'NO');
            const anyGroupYes = group.some(s => s === 'YES');
            const anyGroupNo  = group.some(s => s === 'NO');
            const hasNull = signals.slice(0, 5).some(s => s === null);

            if (hasNull) return { colour: 'GREY', action: 'AWAITING DATA' };

            // GREEN: signal 1 YES + all of 2–5 YES
            if (mcsi === 'YES' && allGroupYes)  return { colour: 'GREEN',  action: 'FULL EXPOSURE ALLOWED' };
            // YELLOW: signal 1 YES + any of 2–5 NO
            if (mcsi === 'YES' && anyGroupNo)   return { colour: 'YELLOW', action: 'REDUCED EXPOSURE' };
            // AMBER: signal 1 ATTEMPT (regardless of 2–5)
            if (mcsi === 'ATTEMPT')             return { colour: 'AMBER',  action: 'TEST ONE TRADE ONLY' };
            // ORANGE: signal 1 NO + any of 2–5 YES
            if (mcsi === 'NO' && anyGroupYes)   return { colour: 'ORANGE', action: 'NO NEW EXPOSURE' };
            // RED: all of 1–5 NO
            if (mcsi === 'NO' && allGroupNo)    return { colour: 'RED',    action: '100% CASH OR SHORT' };

            return { colour: 'ORANGE', action: 'NO NEW EXPOSURE' };
        },

                    text: 'color: #6ee7b7;', textGlow: 'text-shadow: 0 0 8px rgba(110,231,183,0.4);',

                    text: 'color: #fbbf24;', textGlow: 'text-shadow: 0 0 8px rgba(251,191,36,0.35);',

                    bannerBorder: 'border-bottom: 1px solid rgba(251,146,60,0.3);',
                    orb: 'background: radial-gradient(circle at 35% 35%, #fed7aa, #f97316 50%, #7c2d12 100%); box-shadow: 0 0 12px rgba(251,146,60,0.5), 0 0 4px rgba(249,115,22,0.7), inset 0 -2px 4px rgba(0,0,0,0.3);',
                    text: 'color: #fb923c;', textGlow: 'text-shadow: 0 0 8px rgba(251,146,60,0.35);',

                    shimmer: 'background-image: linear-gradient(90deg, transparent 30%, rgba(251,146,60,0.12) 50%, transparent 70%);',
                    panelBorder: 'border-color: rgba(251,146,60,0.2);'
                },
                'RED': {

                    text: 'color: #f87171;', textGlow: 'text-shadow: 0 0 10px rgba(248,113,113,0.5);',
                    actionBg: 'background: rgba(127,29,29,0.3); border: 1px solid rgba(248,113,113,0.15);',
                    shimmer: 'background-image: linear-gradient(90deg, transparent 30%, rgba(248,113,113,0.15) 50%, transparent 70%);',
                    panelBorder: 'border-color: rgba(248,113,113,0.25);'
                },
                'GREY': {
                    banner: 'background: linear-gradient(160deg, #1e293b 0%, #475569 30%, #94a3b8 50%, #475569 70%, #1e293b 100%);',
                    bannerBorder: 'border-bottom: 1px solid rgba(148,163,184,0.2);',
                    orb: 'background: radial-gradient(circle at 35% 35%, #cbd5e1, #64748b 50%, #1e293b 100%); box-shadow: 0 0 8px rgba(148,163,184,0.3), inset 0 -2px 4px rgba(0,0,0,0.3);',
                    text: 'color: #94a3b8;', textGlow: '',
                    actionBg: 'background: rgba(30,41,59,0.5); border: 1px solid rgba(148,163,184,0.1);',
                    shimmer: 'background-image: linear-gradient(90deg, transparent 30%, rgba(148,163,184,0.08) 50%, transparent 70%);',
                    panelBorder: 'border-color: rgba(148,163,184,0.15);'
                }
            };
            return map[colour] || map['GREY'];
        },

        // =====================================================================
        // TRACTION — Manual toggle (standalone: no trade journal)
        // =====================================================================
        // In standalone mode, traction is a simple YES/NO/null manual signal.
        // The user sets it based on their own assessment of recent trade performance.
        _computeTraction() {
            // No-op in standalone: traction is manual only via override toggle
            // or the dedicated traction selector below
        },

        setTractionManual(value) {
            const tm = this.data.settings.trendMap;
            if (value === 'yes') tm.signals.p4_traction = true;
            else if (value === 'no') tm.signals.p4_traction = false;
            else tm.signals.p4_traction = null;
            this.save();
            this.renderTrendMap();
        },

        // =====================================================================
        // QQQE DATA FETCH (Alpaca)
        // =====================================================================
        async fetchTrendMapData() {
            const tm = this.data.settings.trendMap;

            // Reset all manual overrides back to auto on refresh
            if (tm.overrides) {
                Object.keys(tm.overrides).forEach(k => { tm.overrides[k] = null; });
            }

            // Show spinner
            const btn = document.getElementById('trendMapRefreshBtn');
            if (btn) { btn.disabled = true; btn.style.opacity = '0.5'; btn.innerHTML = '<i data-lucide="loader-2" class="w-3.5 h-3.5 animate-spin"></i>'; lucide.createIcons(); }

            try {
                const ak = 'PKUUSHFDNCOL7TAO3INP6BO4VJ';
                const as = '3kqytxkfDqxRuAmQjGdzeYYTGCT5jdF9GLtKqwNbNBxW';

                const symbol = 'QQQE';
                const end = new Date(), start = new Date(); start.setMonth(start.getMonth() - 7);
                const startStr = start.toISOString().split('T')[0], endStr = end.toISOString().split('T')[0];
                let dailyData = [];

                // Fetch daily bars
                try {
                    let url = `https://data.alpaca.markets/v2/stocks/${symbol}/bars?timeframe=1Day&start=${startStr}&end=${endStr}&limit=200&adjustment=split&sort=asc`;
                    const h = { 'APCA-API-KEY-ID': ak, 'APCA-API-SECRET-KEY': as, 'Accept': 'application/json' };
                    let res = await fetch(url, { headers: h });
                    if (res.status === 403) res = await fetch(`${url}&feed=iex`, { headers: h });
                    if (res.ok) { const d = await res.json(); if (d.bars?.length) dailyData = d.bars.map(b => ({ date: new Date(b.t), close: b.c })); }
                } catch (e) { console.warn('Alpaca bars failed:', e); }

                if (dailyData.length < 30) throw new Error('Insufficient QQQE data');

                const sma = (data, p) => { const r = []; for (let i = 0; i < data.length; i++) { if (i < p-1) r.push(null); else { let s = 0; for (let j = i-p+1; j <= i; j++) s += data[j].close; r.push(s/p); } } return r; };

                const sma5 = sma(dailyData, 5), sma10 = sma(dailyData, 10), sma20 = sma(dailyData, 20);
                const li = dailyData.length - 1, lc = dailyData[li].close;
                const ls5 = sma5[li], ps5 = sma5[li-1], ls10 = sma10[li], ls20 = sma20[li];

                tm.signals.p1_above_rising_5sma = (lc > ls5) && (ls5 > ps5);
                tm.signals.p2_daily_buy_signal = (lc > ls10) && (lc > ls20) && (ls10 > ls20);

                // Weekly
                const wd = []; let wb = [], cw = -1;
                dailyData.forEach(d => {
                    const wn = this._getISOWeek(d.date), yw = d.date.getFullYear() * 100 + wn;
                    if (yw !== cw && wb.length) { wd.push(wb[wb.length-1]); wb = []; }
                    cw = yw; wb.push(d);
                });
                if (wb.length) wd.push(wb[wb.length-1]);

                if (wd.length >= 20) {
                    const w10 = sma(wd, 10), w20 = sma(wd, 20), wi = wd.length - 1;
                    tm.signals.p3_weekly_buy_signal = (wd[wi].close > w10[wi]) && (wd[wi].close > w20[wi]) && (w10[wi] > w20[wi]);
                }

                tm.priceCache = { lastClose: lc, sma5: ls5, sma10: ls10, sma20: ls20, sma5Rising: ls5 > ps5 };
                tm.lastFetch = new Date().toISOString();
                this.save();

                // Also fetch breadth data
                await this.fetchBreadthData();

                this.renderTrendMap();

            } catch (err) {
                console.warn('Trend MAP error:', err);
                if (btn) { btn.disabled = false; btn.style.opacity = ''; btn.innerHTML = '<i data-lucide="alert-triangle" class="w-3.5 h-3.5" style="color:#f87171"></i>'; lucide.createIcons(); }
                setTimeout(() => this.renderTrendMap(), 3000);
            }
        },

        _getISOWeek(date) {
            const d = new Date(date); d.setHours(0,0,0,0);
            d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
            const w1 = new Date(d.getFullYear(), 0, 4);
            return 1 + Math.round(((d - w1) / 86400000 - 3 + (w1.getDay() + 6) % 7) / 7);
        },

        // =====================================================================
        // SIGNAL TOGGLE / RESET
        // =====================================================================
        toggleTrendMapSignal(pointNum) {
            const tm = this.data.settings.trendMap, key = `p${pointNum}`, cur = tm.overrides[key];
            if (cur === null || cur === undefined) tm.overrides[key] = 'YES';
            else if (cur === 'YES') tm.overrides[key] = 'NO';
            else if (cur === 'NO') tm.overrides[key] = pointNum === 1 ? 'ATTEMPT' : null;
            else tm.overrides[key] = null;
            this.save();
            this.renderTrendMap();
        },

        resetTrendMapOverride(pointNum) {
            this.data.settings.trendMap.overrides[`p${pointNum}`] = null;
            this.save();
            this.renderTrendMap();
        },

        // =====================================================================
        // TRADING DAYS REMAINING
        // =====================================================================
        _getTradingDaysRemaining() {
            const now = new Date();
            const year = now.getFullYear();
            const endOfYear = new Date(year, 11, 31);
            const holidays = this._getUSMarketHolidays(year);
            let tradingDays = 0;
            const d = new Date(now);
            d.setDate(d.getDate() + 1);
            while (d <= endOfYear) {
                const day = d.getDay();
                const dateStr = d.toISOString().split('T')[0];
                if (day !== 0 && day !== 6 && !holidays.has(dateStr)) tradingDays++;
                d.setDate(d.getDate() + 1);
            }
            return tradingDays;
        },

        _getUSMarketHolidays(year) {
            const holidays = new Set();
            let ny = new Date(year, 0, 1);
            if (ny.getDay() === 0) ny.setDate(2);
            if (ny.getDay() !== 6) holidays.add(ny.toISOString().split('T')[0]);
            let mlk = new Date(year, 0, 1), mc = 0;
            while (mc < 3) { mlk.setDate(mlk.getDate() + 1); if (mlk.getDay() === 1) mc++; }
            holidays.add(mlk.toISOString().split('T')[0]);
            let pres = new Date(year, 1, 1); mc = 0;
            while (mc < 3) { pres.setDate(pres.getDate() + 1); if (pres.getDay() === 1) mc++; }
            holidays.add(pres.toISOString().split('T')[0]);
            const easter = this._computeEaster(year);
            const gf = new Date(easter); gf.setDate(gf.getDate() - 2);
            holidays.add(gf.toISOString().split('T')[0]);
            let mem = new Date(year, 4, 31);
            while (mem.getDay() !== 1) mem.setDate(mem.getDate() - 1);
            holidays.add(mem.toISOString().split('T')[0]);
            let jn = new Date(year, 5, 19);
            if (jn.getDay() === 0) jn.setDate(20); if (jn.getDay() === 6) jn.setDate(18);
            holidays.add(jn.toISOString().split('T')[0]);
            let j4 = new Date(year, 6, 4);
            if (j4.getDay() === 0) j4.setDate(5); if (j4.getDay() === 6) j4.setDate(3);
            holidays.add(j4.toISOString().split('T')[0]);
            let lab = new Date(year, 8, 1);
            while (lab.getDay() !== 1) lab.setDate(lab.getDate() + 1);
            holidays.add(lab.toISOString().split('T')[0]);
            let thx = new Date(year, 10, 1); let tc = 0;
            while (tc < 4) { if (thx.getDay() === 4) tc++; if (tc < 4) thx.setDate(thx.getDate() + 1); }
            holidays.add(thx.toISOString().split('T')[0]);
            let xm = new Date(year, 11, 25);
            if (xm.getDay() === 0) xm.setDate(26); if (xm.getDay() === 6) xm.setDate(24);
            holidays.add(xm.toISOString().split('T')[0]);
            return holidays;
        },

        _computeEaster(year) {
            const a = year % 19, b = Math.floor(year / 100), c = year % 100;
            const d = Math.floor(b / 4), e = b % 4, f = Math.floor((b + 8) / 25);
            const g = Math.floor((b - f + 1) / 3), h = (19 * a + b - d - g + 15) % 30;
            const i = Math.floor(c / 4), k = c % 4;
            const l = (32 + 2 * e + 2 * i - h - k) % 7;
            const m = Math.floor((a + 11 * h + 22 * l) / 451);
            const month = Math.floor((h + l - 7 * m + 114) / 31) - 1;
            const day = ((h + l - 7 * m + 114) % 31) + 1;
            return new Date(year, month, day);
        },

        // =====================================================================
        // EXPOSURE RULES EDITOR
        // =====================================================================
        _openExposureRulesEditor() {
            const tm = this.data.settings.trendMap;
            if (!tm) return;
            const defaults = this._trendMapDefaults().exposureRules;
            const rules = tm.exposureRules || defaults;
            const colours = ['GREEN', 'YELLOW', 'AMBER', 'ORANGE', 'RED'];
            const colourCss = { GREEN: '#6ee7b7', YELLOW: '#fde047', AMBER: '#fbbf24', ORANGE: '#fb923c', RED: '#f87171' };

            const fields = colours.map(c => `
                <div class="mb-3">
                    <label class="text-[10px] font-bold uppercase mb-1 block" style="color:${colourCss[c]}">${c}</label>
                    <textarea id="exposureRule_${c}" rows="2" class="w-full bg-slate-900 border border-slate-700 rounded px-2 py-1.5 text-[11px] text-slate-300 outline-none focus:border-blue-500 resize-none leading-relaxed">${rules[c] || defaults[c] || ''}</textarea>
                </div>
            `).join('');

            this._showModal(`
                <div class="flex justify-between items-center p-3 border-b border-slate-700 bg-slate-900/50">
                    <span class="text-[10px] text-slate-500 uppercase font-bold tracking-wider">Edit Exposure Rules</span>

            `);

        _saveExposureRules() {

        },

        // =====================================================================
        // BREADTH MODULE (NASDAQ-100 components)
        // =====================================================================
        _QQQE_COMPONENTS: [
            'AAPL','ABNB','ADBE','ADI','ADP','ADSK','AEP','AMAT','AMGN','AMZN',
            'ANSS','APP','ARM','ASML','AVGO','AZN','BIIB','BKNG','BKR','CCEP',
            'CDNS','CDW','CEG','CHTR','CMCSA','COST','CPRT','CRWD','CSCO','CSGP',
            'CSX','CTAS','CTSH','DASH','DDOG','DLTR','DXCM','EA','EXC','FANG',
            'FAST','FTNT','GEHC','GFS','GILD','GOOG','GOOGL','HON','IDXX','INTC',
            'INTU','ISRG','KDP','KHC','KLAC','LIN','LRCX','LULU','MAR','MCHP',
            'MDB','MDLZ','MELI','META','MNST','MRVL','MSFT','MU','NFLX','NVDA',
            'NXPI','ODFL','ON','ORLY','PCAR','PAYX','PANW','PDD','PEP','PLTR',
            'PYPL','QCOM','REGN','ROP','ROST','SBUX','SHOP','SMCI','SNPS','SPX',
            'TEAM','TMUS','TRI','TSLA','TTD','TTWO','TXN','VRSK','VRTX','WBD','XEL'
        ],

        _breadthDefaults() {
            return {
                snapshots: {}, advancers: 0, decliners: 0,
                newHighs: 0, newLows: 0, netHighLow: 0,
                netHighLowHistory: [], adHistory: [],
                mcclellan: {
                    oscillator: null, summationIndex: null, prevSummationIndex: null,
                    ema19: null, ema39: null,
                    overboughtThreshold: 7, oversoldThreshold: -7,
                    isOverbought: false, mcsiUptrend: false
                },
                baseline: null, baselineLoaded: false,
                lastBreadthFetch: null, componentCount: 0
            };
        },

        initBreadth() {
            if (!this.data.settings.breadthData) {
                this.data.settings.breadthData = this._breadthDefaults();
            }
            const bd = this.data.settings.breadthData;
            if (!bd.netHighLowHistory) bd.netHighLowHistory = [];
            if (!bd.adHistory) bd.adHistory = [];
            if (!bd.snapshots) bd.snapshots = {};
            if (!bd.mcclellan) bd.mcclellan = this._breadthDefaults().mcclellan;
        },

        async _fetchBaseline() {
            try {
                const res = await fetch(`breadth_baseline.json?v=${Date.now()}`);
                if (!res.ok) return null;
                const data = await res.json();
                if (data.version && data.lastState && data.dailySeries) {
                    console.log(`Breadth: Baseline loaded — ${data.tradingDays} days, last: ${data.lastState.date}`);
                    return data;
                }
                return null;
            } catch (e) { console.warn('Baseline fetch error:', e); return null; }
        },

        async fetchBreadthData() {
            const ak = 'PKUUSHFDNCOL7TAO3INP6BO4VJ';
            const as = '3kqytxkfDqxRuAmQjGdzeYYTGCT5jdF9GLtKqwNbNBxW';

            this.initBreadth();
            const bd = this.data.settings.breadthData;
            const headers = { 'APCA-API-KEY-ID': ak, 'APCA-API-SECRET-KEY': as, 'Accept': 'application/json' };

            // Step 1: Load baseline (always re-fetch on manual refresh to get latest)
            const freshBaseline = await this._fetchBaseline();
            if (freshBaseline) {
                bd.baseline = freshBaseline;
                bd.baselineLoaded = true;
                // Merge: keep live entries newer than the baseline end date
                const baselineEnd = freshBaseline.lastState?.date || '';
                const liveNewer = (bd.adHistory || []).filter(d => d.date > baselineEnd);
                bd.adHistory = [...(freshBaseline.adHistory || []), ...liveNewer];
                // Seed H/L history from baseline (version 3+)
                if (freshBaseline.hlHistory && freshBaseline.hlHistory.length) {
                    bd.netHighLowHistory = freshBaseline.hlHistory.slice();
                }
            }

            const components = (bd.baseline?.components?.length >= 80) ? bd.baseline.components : this._QQQE_COMPONENTS;

            // Step 2: Batch snapshot fetch
            const batchSize = 50;
            const allSnapshots = {};
            for (let i = 0; i < components.length; i += batchSize) {
                const batch = components.slice(i, i + batchSize);
                try {
                    let url = `https://data.alpaca.markets/v2/stocks/snapshots?symbols=${batch.join(',')}`;
                    let res = await fetch(url, { headers });
                    if (res.status === 403) res = await fetch(`${url}&feed=iex`, { headers });
                    if (res.ok) Object.assign(allSnapshots, await res.json());
                } catch (e) { console.warn(`Snapshot batch ${i} failed:`, e); }
            }

            // Step 3: Process snapshots
            let advancers = 0, decliners = 0, processed = 0;
            const snapData = {};
            components.forEach(sym => {
                const snap = allSnapshots[sym];
                if (!snap) return;
                const price = snap.latestTrade?.p || snap.dailyBar?.c || 0;
                const prevClose = snap.prevDailyBar?.c || 0;
                if (price <= 0 || prevClose <= 0) return;
                if (price > prevClose) advancers++;
                else if (price < prevClose) decliners++;
                snapData[sym] = {
                    price, prevClose,
                    dailyHigh: snap.dailyBar?.h || price,
                    dailyLow: snap.dailyBar?.l || price,
                    advancing: price > prevClose
                };
                processed++;
            });

            // Step 4: 52-week high/low
            await this._fetch52WeekData(headers, components, snapData);

            // Step 5: Calculate Net 52-Week H/L
            let newHighs = 0, newLows = 0;
            components.forEach(sym => {
                const s = snapData[sym];
                if (!s) return;
                s.changePct = s.prevClose > 0 ? ((s.price - s.prevClose) / s.prevClose * 100) : 0;
                s.distFromHigh = (s.high52w && s.high52w > 0) ? ((s.high52w - s.price) / s.high52w) : 1;
                s.distFromLow = (s.low52w && s.low52w > 0) ? ((s.price - s.low52w) / s.low52w) : 1;
                s.isNew52wHigh = (s.priorHigh52w !== null && s.priorHigh52w !== undefined && s.dailyHigh >= s.priorHigh52w);
                s.isNew52wLow = (s.priorLow52w !== null && s.priorLow52w !== undefined && s.dailyLow <= s.priorLow52w);
                if (s.isNew52wHigh) newHighs++;
                if (s.isNew52wLow) newLows++;
            });

            const netHighLow = newHighs - newLows;
            bd.snapshots = snapData;
            bd.advancers = advancers;
            bd.decliners = decliners;
            bd.newHighs = newHighs;
            bd.newLows = newLows;
            bd.netHighLow = netHighLow;
            bd.componentCount = processed;
            bd.lastBreadthFetch = new Date().toISOString();

            const now = new Date();
            const isWeekend = now.getDay() === 0 || now.getDay() === 6;
            const today = now.toISOString().split('T')[0];

            // Purge weekend entries
            const purge = (arr) => {
                for (let i = arr.length - 1; i >= 0; i--) {
                    const d = new Date(arr[i].date + 'T12:00:00Z');
                    if (d.getUTCDay() === 0 || d.getUTCDay() === 6) arr.splice(i, 1);
                }
            };
            purge(bd.adHistory);
            purge(bd.netHighLowHistory);

            if (!isWeekend) {
                const updateHistory = (arr, entry, maxLen) => {
                    const existing = arr.find(h => h.date === today);
                    if (existing) Object.assign(existing, entry);
                    else { arr.push({ date: today, ...entry }); if (arr.length > maxLen) arr.shift(); }
                };
                updateHistory(bd.netHighLowHistory, { net: netHighLow, highs: newHighs, lows: newLows }, 60);
                updateHistory(bd.adHistory, { advances: advancers, declines: decliners, netAD: advancers - decliners }, 60);
            }

            this._computeNetHighLowSignal();
            this._computeMcClellan();
            this.save();
            return true;
        },

        async _fetch52WeekData(headers, components, snapData) {
            const end = new Date(), start = new Date();
            start.setFullYear(start.getFullYear() - 1);
            const startStr = start.toISOString().split('T')[0];
            const endStr = end.toISOString().split('T')[0];
            const batchSize = 50;

            for (let i = 0; i < components.length; i += batchSize) {
                const batch = components.slice(i, i + batchSize);
                try {
                    let url = `https://data.alpaca.markets/v2/stocks/bars?symbols=${batch.join(',')}&timeframe=1Day&start=${startStr}&end=${endStr}&limit=10000&adjustment=split&sort=asc`;
                    let allBars = {};
                    let pageToken = null, pages = 0;
                    do {
                        let fetchUrl = pageToken ? `${url}&page_token=${pageToken}` : url;
                        let res = await fetch(fetchUrl, { headers });
                        if (res.status === 403) res = await fetch(`${fetchUrl}&feed=iex`, { headers });
                        if (!res.ok) break;
                        const data = await res.json();
                        if (data.bars) {
                            Object.entries(data.bars).forEach(([sym, bars]) => {
                                if (!allBars[sym]) allBars[sym] = [];
                                allBars[sym] = allBars[sym].concat(bars);
                            });
                        }
                        pageToken = data.next_page_token || null;
                        pages++;
                    } while (pageToken && pages < 10);

                    batch.forEach(sym => {
                        const bars = allBars[sym];
                        if (!bars || !bars.length) return;
                        const sortedBars = bars.sort((a, b) => a.t.localeCompare(b.t));
                        const priorBars = sortedBars.length > 1 ? sortedBars.slice(0, -1) : sortedBars;
                        let priorHigh = -Infinity, priorLow = Infinity;
                        priorBars.forEach(b => { if (b.h > priorHigh) priorHigh = b.h; if (b.l < priorLow) priorLow = b.l; });
                        if (snapData[sym]) {
                            snapData[sym].priorHigh52w = priorHigh === -Infinity ? null : priorHigh;
                            snapData[sym].priorLow52w = priorLow === Infinity ? null : priorLow;
                            snapData[sym].high52w = Math.max(priorHigh, snapData[sym].dailyHigh);
                            snapData[sym].low52w = Math.min(priorLow, snapData[sym].dailyLow);
                        }
                    });
                } catch (e) { console.warn(`52w batch ${i} failed:`, e); }
            }
        },

        // =====================================================================
        // McCLELLAN CALCULATIONS
        // =====================================================================
        _computeNetHighLowSignal() {
            const tm = this.data.settings.trendMap;
            const bd = this.data.settings.breadthData;
            if (!tm || !bd) return;
            const history = bd.netHighLowHistory;
            if (history.length === 0) return;
            const current = history[history.length - 1];
            if (history.length === 1) { tm.signals.p6_net_52wk_positive = current.net > 0; return; }
            const previous = history[history.length - 2];
            tm.signals.p6_net_52wk_positive = (current.net > 0) && (current.net >= previous.net);
        },

        _getMcsiRecentHistory(mc, bd) {
            const values = [];
            const baseline = bd.baseline;
            if (baseline && baseline.dailySeries && baseline.dailySeries.length > 0) {
                const series = baseline.dailySeries;
                const startIdx = Math.max(0, series.length - 20);
                for (let i = startIdx; i < series.length; i++) values.push(series[i].summationIndex);
                const baselineDate = baseline.lastState.date;
                const newDays = bd.adHistory.filter(d => d.date > baselineDate);
                if (newDays.length > 0) {
                    const k19 = 2 / 20, k39 = 2 / 40;
                    let ema19 = baseline.lastState.ema19, ema39 = baseline.lastState.ema39, si = baseline.lastState.summationIndex;
                    newDays.forEach(day => {
                        ema19 = (day.netAD * k19) + (ema19 * (1 - k19));
                        ema39 = (day.netAD * k39) + (ema39 * (1 - k39));
                        si += (ema19 - ema39);
                        values.push(parseFloat(si.toFixed(4)));
                    });
                }
            } else {
                if (mc.prevSummationIndex !== null) values.push(mc.prevSummationIndex);
                if (mc.summationIndex !== null) values.push(mc.summationIndex);
            }
            return values;
        },

        _computeMcClellan() {
            const tm = this.data.settings.trendMap;
            const bd = this.data.settings.breadthData;
            if (!tm || !bd) return;

            const k19 = 2 / 20, k39 = 2 / 40;
            const mc = bd.mcclellan;
            const baseline = bd.baseline;

            if (baseline && baseline.lastState) {
                let ema19 = baseline.lastState.ema19, ema39 = baseline.lastState.ema39;
                let summationIndex = baseline.lastState.summationIndex, prevSummationIndex = summationIndex;
                let oscillator = baseline.lastState.oscillator;
                const newDays = bd.adHistory.filter(d => d.date > baseline.lastState.date);
                newDays.forEach(day => {
                    ema19 = (day.netAD * k19) + (ema19 * (1 - k19));
                    ema39 = (day.netAD * k39) + (ema39 * (1 - k39));
                    oscillator = ema19 - ema39;
                    prevSummationIndex = summationIndex;
                    summationIndex += oscillator;
                });
                mc.ema19 = parseFloat(ema19.toFixed(6));
                mc.ema39 = parseFloat(ema39.toFixed(6));
                mc.oscillator = parseFloat(oscillator.toFixed(4));
                mc.prevSummationIndex = parseFloat(prevSummationIndex.toFixed(4));
                mc.summationIndex = parseFloat(summationIndex.toFixed(4));
            } else {
                const adData = bd.adHistory;
                if (!adData || adData.length < 20) return;
                let ema19 = null, ema39 = null, summationIndex = 0, prevSummationIndex = 0, oscillator = 0;
                adData.forEach((day, i) => {
                    const netAD = day.netAD;
                    if (i === 0) { ema19 = netAD; ema39 = netAD; }
                    else { ema19 = (netAD * k19) + (ema19 * (1 - k19)); ema39 = (netAD * k39) + (ema39 * (1 - k39)); }
                    oscillator = ema19 - ema39;
                    prevSummationIndex = summationIndex;
                    summationIndex += oscillator;
                });
                mc.ema19 = parseFloat(ema19.toFixed(6));
                mc.ema39 = parseFloat(ema39.toFixed(6));
                mc.oscillator = parseFloat(oscillator.toFixed(4));
                mc.prevSummationIndex = parseFloat(prevSummationIndex.toFixed(4));
                mc.summationIndex = parseFloat(summationIndex.toFixed(4));
            }

            // MCSI Signal
            const siHistory = this._getMcsiRecentHistory(mc, bd);
            if (siHistory.length >= 12) {
                const len = siHistory.length;
                let sma10Today = 0, sma10Yesterday = 0;
                for (let j = len - 10; j < len; j++) sma10Today += siHistory[j];
                sma10Today /= 10;
                for (let j = len - 11; j < len - 1; j++) sma10Yesterday += siHistory[j];
                sma10Yesterday /= 10;
                const aboveSma = siHistory[len - 1] > sma10Today;
                const mcsiRising = siHistory[len - 1] > siHistory[len - 2];
                const smaRising = sma10Today > sma10Yesterday;
                let consecutiveRising = 0;
                for (let j = len - 1; j >= 1; j--) { if (siHistory[j] > siHistory[j - 1]) consecutiveRising++; else break; }

                let mcsiSignal;
                if (aboveSma && mcsiRising && smaRising) mcsiSignal = 'YES';
                else if (!aboveSma && consecutiveRising >= 2) mcsiSignal = 'ATTEMPT';
                else mcsiSignal = 'NO';

                mc.mcsiUptrend = mcsiSignal === 'YES';
                mc._mcsiConsecutiveRising = consecutiveRising;
                if (mcsiSignal === 'YES') tm.signals.p5_mcsi_uptrend = true;
                else if (mcsiSignal === 'ATTEMPT') tm.signals.p5_mcsi_uptrend = 'ATTEMPT';
                else tm.signals.p5_mcsi_uptrend = false;
            } else {
                mc.mcsiUptrend = mc.summationIndex > mc.prevSummationIndex;
                tm.signals.p5_mcsi_uptrend = mc.mcsiUptrend;
            }

            const threshold = mc.overboughtThreshold || 7;
            mc.isOverbought = mc.oscillator >= threshold;
            tm.signals.p7_mco_out_overbought = mc.oscillator < threshold;
        },

        _buildMcClellanSeries() {
            const bd = this.data.settings.breadthData;
            if (!bd) return [];
            let series = [];
            const baseline = bd.baseline;
            if (baseline && baseline.dailySeries && baseline.dailySeries.length > 0) {
                series = baseline.dailySeries.slice();
                const newDays = bd.adHistory.filter(d => d.date > baseline.lastState.date);
                if (newDays.length > 0) {
                    const k19 = 2 / 20, k39 = 2 / 40;
                    let ema19 = baseline.lastState.ema19, ema39 = baseline.lastState.ema39, si = baseline.lastState.summationIndex;
                    newDays.forEach(day => {
                        ema19 = (day.netAD * k19) + (ema19 * (1 - k19));
                        ema39 = (day.netAD * k39) + (ema39 * (1 - k39));
                        const osc = ema19 - ema39;
                        si += osc;
                        series.push({ date: day.date, advances: day.advances, declines: day.declines, netAD: day.netAD, ema19: parseFloat(ema19.toFixed(4)), ema39: parseFloat(ema39.toFixed(4)), oscillator: parseFloat(osc.toFixed(4)), summationIndex: parseFloat(si.toFixed(4)) });
                    });
                }
            } else if (bd.adHistory && bd.adHistory.length > 0) {
                const k19 = 2 / 20, k39 = 2 / 40;
                let ema19 = 0, ema39 = 0, si = 0;
                bd.adHistory.forEach((day, i) => {
                    if (i === 0) { ema19 = day.netAD; ema39 = day.netAD; }
                    else { ema19 = (day.netAD * k19) + (ema19 * (1 - k19)); ema39 = (day.netAD * k39) + (ema39 * (1 - k39)); }
                    const osc = ema19 - ema39;
                    si += osc;
                    series.push({ date: day.date, advances: day.advances, declines: day.declines, netAD: day.netAD, ema19: parseFloat(ema19.toFixed(4)), ema39: parseFloat(ema39.toFixed(4)), oscillator: parseFloat(osc.toFixed(4)), summationIndex: parseFloat(si.toFixed(4)) });
                });
            }
            return series;
        },

        // =====================================================================
        // McCLELLAN DETAIL MODAL
        // =====================================================================
        _openMcClellanDetail() {
            const bd = this.data.settings.breadthData;
            if (!bd) return;
            const mc = bd.mcclellan || {};
            const series = this._buildMcClellanSeries();
            if (series.length === 0) {
                this._showModal('<div class="p-4"><div class="text-center text-slate-500 text-sm py-8">No McClellan data. Click Refresh to fetch QQQE data.</div></div>');
                return;
            }

            const chartW = 340, chartH = 80;
            const miniSeries = series.slice(-90);

            // MCO bars
            const barW = Math.max(1.5, Math.floor((chartW - 10) / miniSeries.length) - 0.5);
            const oscValues = miniSeries.map(s => s.oscillator);
            const maxOsc = Math.max(Math.abs(Math.min(...oscValues)), Math.abs(Math.max(...oscValues)), 0.1);
            const midY = chartH / 2;
            let bars = '';
            miniSeries.forEach((s, i) => {
                const x = 5 + i * (barW + 0.5);
                const h = Math.abs(s.oscillator) / maxOsc * (chartH / 2 - 4);
                const y = s.oscillator >= 0 ? midY - h : midY;
                bars += `<rect x="${x}" y="${y}" width="${barW}" height="${Math.max(0.5, h)}" fill="${s.oscillator >= 0 ? '#34d399' : '#f87171'}" rx="0.3"/>`;
            });

            // MCSI line
            const siValues = miniSeries.map(s => s.summationIndex);
            const minSi = Math.min(...siValues), maxSi = Math.max(...siValues);
            const siRange = maxSi - minSi || 1;
            let siPath = '', sma10Path = '';
            miniSeries.forEach((s, i) => {
                const x = 5 + i * (barW + 0.5) + barW / 2;
                const y = chartH - 4 - ((s.summationIndex - minSi) / siRange * (chartH - 8));
                siPath += (i === 0 ? 'M' : 'L') + `${x.toFixed(1)},${y.toFixed(1)}`;
                if (i >= 9) {
                    let sum = 0;
                    for (let j = i - 9; j <= i; j++) sum += miniSeries[j].summationIndex;
                    const smaY = chartH - 4 - (((sum / 10) - minSi) / siRange * (chartH - 8));
                    sma10Path += (i === 9 ? 'M' : 'L') + `${x.toFixed(1)},${smaY.toFixed(1)}`;
                }
            });

            const dateLabels = [];
            const step = Math.max(1, Math.floor(miniSeries.length / 5));
            for (let i = 0; i < miniSeries.length; i += step) {
                const x = 5 + i * (barW + 0.5) + barW / 2;
                dateLabels.push(`<text x="${x}" y="${chartH + 10}" fill="#475569" font-size="6" text-anchor="middle">${miniSeries[i].date.slice(5)}</text>`);
            }

            const recentDays = series.slice(-10);
            const adTableRows = recentDays.map(s => {
                const oscC = s.oscillator > 0 ? 'color:#6ee7b7' : 'color:#f87171';
                const siC = s.summationIndex > 0 ? 'color:#6ee7b7' : 'color:#f87171';
                return `<div class="grid grid-cols-6 gap-1 text-[9px] font-mono py-0.5 border-b border-slate-800/30">
                    <span class="text-slate-500">${s.date.slice(5)}</span>
                    <span style="color:#6ee7b7" class="text-right">${s.advances}</span>
                    <span style="color:#f87171" class="text-right">${s.declines}</span>
                    <span class="text-right" style="${s.netAD > 0 ? 'color:#6ee7b7' : 'color:#f87171'}">${s.netAD > 0 ? '+' : ''}${s.netAD}</span>
                    <span class="text-right" style="${oscC}">${s.oscillator > 0 ? '+' : ''}${s.oscillator.toFixed(2)}</span>
                    <span class="text-right" style="${siC}">${s.summationIndex.toFixed(0)}</span>
                </div>`;
            }).join('');

            const oscColor = mc.oscillator > 0 ? '#6ee7b7' : '#f87171';
            const siColor = mc.summationIndex > 0 ? '#6ee7b7' : '#f87171';
            const baselineStatus = bd.baseline ? `<span style="color:#6ee7b7">Baseline loaded</span> (${bd.baseline.tradingDays} days)` : '<span style="color:#fbbf24">No baseline — local data only</span>';

            // ── 52-Week H/L Oscillator mini chart ──
            const hlHistory = (bd.netHighLowHistory || []).slice(-60);
            let hlChartHtml = '';
            if (hlHistory.length >= 2) {
                const hlChartW = 340, hlChartH = 80;
                const netValues = hlHistory.map(h => h.net);
                const maxAbsNet = Math.max(Math.abs(Math.min(...netValues)), Math.abs(Math.max(...netValues)), 1);
                const hlMidY = hlChartH / 2;
                const hlBarW = Math.max(1.5, Math.floor((hlChartW - 10) / hlHistory.length) - 0.5);

                // Bars
                let hlBars = '';
                hlHistory.forEach((h, i) => {
                    const x = 5 + i * (hlBarW + 0.5);
                    const barH = Math.abs(h.net) / maxAbsNet * (hlChartH / 2 - 4);
                    const y = h.net >= 0 ? hlMidY - barH : hlMidY;
                    hlBars += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${hlBarW.toFixed(1)}" height="${Math.max(0.5, barH).toFixed(1)}" fill="${h.net >= 0 ? '#34d399' : '#f87171'}" rx="0.3"/>`;
                });

                // 5-day SMA line
                let smaPath = '';
                hlHistory.forEach((h, i) => {
                    if (i >= 4) {
                        let sum = 0;
                        for (let j = i - 4; j <= i; j++) sum += hlHistory[j].net;
                        const avg = sum / 5;
                        const cx = 5 + i * (hlBarW + 0.5) + hlBarW / 2;
                        const cy = hlMidY - (avg / maxAbsNet) * (hlChartH / 2 - 4);
                        smaPath += (i === 4 ? 'M' : 'L') + `${cx.toFixed(1)},${cy.toFixed(1)}`;
                    }
                });

                // Date labels
                const hlStep = Math.max(1, Math.floor(hlHistory.length / 5));
                let hlDateLabels = '';
                for (let i = 0; i < hlHistory.length; i += hlStep) {
                    const x = 5 + i * (hlBarW + 0.5) + hlBarW / 2;
                    hlDateLabels += `<text x="${x.toFixed(1)}" y="${hlChartH + 10}" fill="#475569" font-size="6" text-anchor="middle">${hlHistory[i].date.slice(5)}</text>`;
                }

                // Latest value
                const latestHL = hlHistory[hlHistory.length - 1];
                const latestHLColor = latestHL.net > 0 ? '#6ee7b7' : latestHL.net < 0 ? '#f87171' : '#94a3b8';
                const latestHLStr = `${latestHL.net > 0 ? '+' : ''}${latestHL.net} (${latestHL.highs}H / ${latestHL.lows}L)`;

                hlChartHtml = `
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <div class="text-[9px] text-slate-500 uppercase font-bold">52-Week H/L Oscillator</div>
                            <span class="text-[8px] text-blue-400 cursor-pointer hover:underline" onclick="app._openExpandedChart('hl52')">Expand ↗</span>

                                <line x1="0" y1="${hlMidY}" x2="${hlChartW}" y2="${hlMidY}" stroke="#334155" stroke-width="0.5"/>
                                ${hlBars}
                                ${smaPath ? `<path d="${smaPath}" fill="none" stroke="#fbbf24" stroke-width="1.2" stroke-linejoin="round" opacity="0.85"/>` : ''}
                                ${hlDateLabels}
                            </svg>
                            <div class="flex justify-between text-[8px] font-mono mt-0.5">
                                <span style="color:${latestHLColor}" class="font-bold">${latestHLStr}</span>
                                <div class="flex gap-3 text-slate-600"><span style="color:#34d399">▌</span>Net Highs <span style="color:#f87171">▌</span>Net Lows <span style="color:#fbbf24">—</span>5 SMA</div>
                            </div>
                        </div>
                    </div>`;
            } else {
                hlChartHtml = `
                    <div>
                        <div class="text-[9px] text-slate-500 uppercase font-bold mb-1">52-Week H/L Oscillator</div>
                        <div class="bg-slate-900 rounded-lg p-2 border border-slate-700 text-center text-[9px] text-slate-600 py-4">Accumulating history — refresh daily to build data</div>
                    </div>`;
            }

            this._showModal(`
                <div class="flex justify-between items-center p-3 border-b border-slate-700 bg-slate-900/50">
                    <span class="text-[10px] text-slate-500 uppercase font-bold tracking-wider">McClellan Analysis</span>
                    <button onclick="document.getElementById('trendMapModal').remove()" class="text-slate-500 hover:text-white p-1 transition-colors"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
                <div class="p-4 overflow-y-auto" style="max-height: calc(90vh - 50px);">
                    <div class="space-y-3">
                        <div class="grid grid-cols-2 gap-2">
                            <div class="bg-slate-900 rounded-lg p-2 text-center border border-slate-700">
                                <div class="text-[9px] text-slate-500 uppercase font-bold">Oscillator (MCO)</div>
                                <div class="text-lg font-black font-mono" style="color:${oscColor}">${mc.oscillator > 0 ? '+' : ''}${mc.oscillator.toFixed(2)}</div>
                            </div>
                            <div class="bg-slate-900 rounded-lg p-2 text-center border border-slate-700">
                                <div class="text-[9px] text-slate-500 uppercase font-bold">Summation Index</div>
                                <div class="text-lg font-black font-mono" style="color:${siColor}">${mc.summationIndex > 0 ? '+' : ''}${mc.summationIndex.toFixed(1)}</div>
                            </div>
                        </div>
                        <div>
                            <div class="flex justify-between items-center mb-1">
                                <div class="text-[9px] text-slate-500 uppercase font-bold">McClellan Oscillator</div>
                                <span class="text-[8px] text-blue-400 cursor-pointer hover:underline" onclick="app._openExpandedChart('mco')">Expand ↗</span>
                            </div>
                            <div class="bg-slate-900 rounded-lg p-2 border border-slate-700 cursor-pointer hover:border-slate-600 transition-colors" onclick="app._openExpandedChart('mco')">
                                <svg viewBox="0 0 ${chartW} ${chartH + 14}" class="w-full" style="height:${chartH + 14}px">
                                    <line x1="0" y1="${midY}" x2="${chartW}" y2="${midY}" stroke="#334155" stroke-width="0.5"/>
                                    ${bars}
                                    ${dateLabels.join('')}
                                </svg>
                            </div>
                        </div>
                        <div>
                            <div class="flex justify-between items-center mb-1">
                                <div class="text-[9px] text-slate-500 uppercase font-bold">Summation Index + 10 SMA</div>
                                <span class="text-[8px] text-blue-400 cursor-pointer hover:underline" onclick="app._openExpandedChart('mcsi')">Expand ↗</span>
                            </div>
                            <div class="bg-slate-900 rounded-lg p-2 border border-slate-700 cursor-pointer hover:border-slate-600 transition-colors" onclick="app._openExpandedChart('mcsi')">
                                <svg viewBox="0 0 ${chartW} ${chartH + 14}" class="w-full" style="height:${chartH + 14}px">
                                    ${sma10Path ? `<path d="${sma10Path}" fill="none" stroke="#eab308" stroke-width="1.2" stroke-linejoin="round" opacity="0.8"/>` : ''}
                                    <path d="${siPath}" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-linejoin="round"/>
                                    ${dateLabels.join('')}
                                </svg>
                                <div class="flex justify-between text-[8px] font-mono mt-0.5">
                                    <span style="color:#60a5fa">MCSI ${minSi.toFixed(0)}</span>
                                    <div class="flex gap-3"><span style="color:#60a5fa">— MCSI</span><span style="color:#eab308">— 10 SMA</span></div>
                                    <span style="color:#60a5fa">${maxSi.toFixed(0)}</span>

                        <div>

                            <div class="bg-slate-900 rounded-lg p-2 border border-slate-700">
                                <div class="grid grid-cols-6 gap-1 text-[8px] text-slate-600 uppercase font-bold pb-1 border-b border-slate-700 mb-1">
                                    <span>Date</span><span class="text-right">Adv</span><span class="text-right">Dec</span><span class="text-right">Net</span><span class="text-right">MCO</span><span class="text-right">MCSI</span>

        // =====================================================================
        // STOCK LIST MODAL
        // =====================================================================
        _openStockList(filter) {
            const bd = this.data.settings.breadthData;
            if (!bd || !bd.snapshots) return;
            const titles = {
                advancing: { title: 'Advancing Stocks', color: '#6ee7b7', sort: 'changePct', dir: -1 },
                declining: { title: 'Declining Stocks', color: '#f87171', sort: 'changePct', dir: 1 },
                '52wHigh': { title: 'New 52-Week Highs', color: '#6ee7b7', sort: 'distFromHigh', dir: 1 },
                '52wLow':  { title: 'New 52-Week Lows', color: '#f87171', sort: 'distFromLow', dir: 1 }
            };
            const cfg = titles[filter];
            if (!cfg) return;
            let stocks = Object.entries(bd.snapshots).map(([sym, data]) => ({ sym, ...data }));
            if (filter === 'advancing') stocks = stocks.filter(s => s.advancing === true);
            else if (filter === 'declining') stocks = stocks.filter(s => s.advancing === false && s.price < s.prevClose);
            else if (filter === '52wHigh') stocks = stocks.filter(s => s.isNew52wHigh);
            else if (filter === '52wLow') stocks = stocks.filter(s => s.isNew52wLow);
            stocks.sort((a, b) => ((a[cfg.sort] || 0) - (b[cfg.sort] || 0)) * cfg.dir);

            const rows = stocks.map(s => {
                const chg = s.changePct || 0;
                const chgColor = chg > 0 ? 'color:#6ee7b7' : chg < 0 ? 'color:#f87171' : 'color:#94a3b8';
                const fromHigh = s.distFromHigh !== undefined ? `${(s.distFromHigh * 100).toFixed(1)}%` : '—';
                const fromLow = s.distFromLow !== undefined ? `${(s.distFromLow * 100).toFixed(1)}%` : '—';
                return `<div class="flex items-center justify-between py-1.5 border-b border-slate-800/30">
                    <div class="flex items-center gap-1 min-w-0">
                        <span class="text-[11px] font-bold text-white w-11 flex-shrink-0">${s.sym}</span>
                        <span class="text-[10px] font-mono text-slate-300 w-14 text-right flex-shrink-0">${s.price.toFixed(2)}</span>
                    </div>
                    <div class="flex items-center gap-0 text-[10px] font-mono">
                        <span style="${chgColor}" class="font-bold w-14 text-right">${chg > 0 ? '+' : ''}${chg.toFixed(2)}%</span>
                        <span class="text-slate-400 w-14 text-right" title="From 52w High">↑${fromHigh}</span>
                        <span class="text-slate-400 w-14 text-right" title="From 52w Low">↓${fromLow}</span>
                    </div>
                </div>`;
            }).join('');

            this._showModal(`
                <div class="flex justify-between items-center p-3 border-b border-slate-700 bg-slate-900/50">
                    <span class="text-sm font-bold" style="color:${cfg.color}">${cfg.title} (${stocks.length})</span>
                    <button onclick="document.getElementById('trendMapModal').remove()" class="text-slate-500 hover:text-white p-1 transition-colors"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
                <div class="p-4 overflow-y-auto" style="max-height: calc(90vh - 50px);">
                    <div class="flex items-center justify-between text-[8px] text-slate-500 uppercase font-bold pb-1 mb-1 border-b border-slate-700">
                        <div class="flex items-center gap-1"><span class="w-11">Ticker</span><span class="w-14 text-right">Price</span></div>
                        <div class="flex items-center"><span class="w-14 text-right">Day%</span><span class="w-14 text-right">↑High</span><span class="w-14 text-right">↓Low</span></div>
                    </div>
                    ${stocks.length === 0 ? '<div class="text-center text-slate-500 text-xs py-4">No stocks match</div>' : rows}
                </div>
            `);
        },

        // =====================================================================
        // RENDER: MAIN PANEL
        // =====================================================================
        renderTrendMap() {

            if (!container) return;
            const tm = this.data.settings.trendMap;
            if (!tm) { this.initTrendMap(); return this.renderTrendMap(); }

            const mr = this.getTrendMapColour(), css = this._trendMapColourCSS(mr.colour);
            const lf = tm.lastFetch ? new Date(tm.lastFetch).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : 'Never';
            const tradingDaysLeft = this._getTradingDaysRemaining();

            // Build signal rows
            const labels = [
                { num: 1, full: 'QQQE McClellan Summation Index (MCSI) in an uptrend?', auto: true },
                { num: 2, full: 'QQQE above a rising 5 SMA?', auto: true },
                { num: 3, full: 'Daily Buy Signal? (QQQE above 10/20 SMA + 10SMA > 20SMA)', auto: true },

                { num: 5, full: 'Gained traction on last few trades?', auto: false },

                { num: 7, full: 'McClellan Oscillator out of overbought territory?', auto: true }
            ];
            const signalRows = labels.map(s => {
                const val = this.getTrendMapSignal(s.num);
                const ov = tm.overrides[`p${s.num}`] !== null && tm.overrides[`p${s.num}`] !== undefined;
                let vc, vt;
                if (val === 'YES')     { vc = 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30'; vt = 'YES'; }

            // Price cache
            let priceCacheHtml = '';
            if (tm.priceCache) {
                const p = tm.priceCache;
                priceCacheHtml = `<div class="grid grid-cols-4 gap-1 text-center mt-2 mb-1">

                    const baselineInfo = bd.baseline ? `${bd.baseline.tradingDays} days` : `${bd.adHistory?.length || 0} days (no baseline)`;
                    mcHtml = `

                                    <span>${bd.advancers} Adv</span><span class="text-[8px] font-normal" style="color:#6ee7b7;opacity:0.5;">(${advPct.toFixed(0)}%)</span><i data-lucide="chevron-right" class="w-2.5 h-2.5" style="opacity:0.4;"></i>
