                                ${osInRange ? `<rect x="5" y="${osY.toFixed(1)}" width="${sma5W-10}" height="${(Math.min(y0,sma5H) - osY).toFixed(1)}" fill="rgba(110,231,183,0.06)"/>` : ''}
                                ${obInRange ? `<line x1="5" y1="${obY.toFixed(1)}" x2="${sma5W-5}" y2="${obY.toFixed(1)}" stroke="#f87171" stroke-width="0.7" stroke-dasharray="3,2" opacity="0.7"/><text x="${sma5W-7}" y="${(obY-2).toFixed(1)}" fill="#f87171" font-size="6" text-anchor="end" opacity="0.85">OB 75</text>` : ''}
                                ${osInRange ? `<line x1="5" y1="${osY.toFixed(1)}" x2="${sma5W-5}" y2="${osY.toFixed(1)}" stroke="#6ee7b7" stroke-width="0.7" stroke-dasharray="3,2" opacity="0.7"/><text x="${sma5W-7}" y="${(osY-2).toFixed(1)}" fill="#6ee7b7" font-size="6" text-anchor="end" opacity="0.85">OS 25</text>` : ''}
                                ${(y50 > 0 && y50 < sma5H) ? `<line x1="5" y1="${y50.toFixed(1)}" x2="${sma5W-5}" y2="${y50.toFixed(1)}" stroke="#475569" stroke-width="0.4" opacity="0.5"/>` : ''}
                                <path d="${sma5Path}" fill="none" stroke="${sma5LineColor}" stroke-width="1" stroke-linejoin="round"/>
                                ${sma5DateLabels}
                            </svg>
                            <div class="flex justify-between text-[8px] font-mono mt-0.5">
                                <span style="color:#6ee7b7;opacity:0.7">OS ≤ 25</span>
                                <span class="text-slate-600">50</span>
                                <span style="color:#f87171;opacity:0.7">OB ≥ 75</span>
                            </div>
                        </div>
                    </div>`;
            } else {
                sma5ChartHtml = `
                    <div>
                        <div class="text-[9px] text-slate-500 uppercase font-bold mb-1">% of Stocks Above 5 SMA</div>
                        <div class="bg-slate-900 rounded-lg p-2 border border-slate-700 text-center text-[9px] text-slate-600 py-4">${liveSma5 !== null && liveSma5 !== undefined ? `Current: ${liveSma5.toFixed(1)}% — refresh daily to build history` : 'Accumulating history — refresh daily to build data'}</div>
                    </div>`;
            }

            // ── BIG WAVE MOMENTUM Score ──
            // DAY RATIO = stocks up >4% / stocks down <-4% (ST Momentum ratio)
            // Normalization context: 60-day stMomentumHistory built during full bar fetch
            // Live gt4 counts: updated every 60s via quick poll (bd.liveUpGt4 / bd.liveDnGt4)
            let gdbHtml = '';
            (() => {
                // Normalize val against a FIXED historical range (history-only, excludes today).
                // Today's live value is clamped into that range but cannot shift the boundaries,
                // preventing single-poll jumps from snapping the gauge to an extreme.
                const normalizeFixed = (val, histArr) => {
                    if (!histArr || histArr.length === 0) return 0.5;
                    const mn = Math.min(...histArr), mx = Math.max(...histArr);
                    if (mx === mn) return 0.5;
                    return Math.max(0, Math.min(1, (val - mn) / (mx - mn)));
                };

                // Live gt4 counts — prefer stored live values, fall back to computing from snapshots
                const snaps = bd.snapshots || {};
                let upGt4 = bd.liveUpGt4, dnGt4 = bd.liveDnGt4;
                if (upGt4 === undefined || dnGt4 === undefined) {
                    upGt4 = 0; dnGt4 = 0;
                    Object.values(snaps).forEach(s => {
                        const chg = s.changePct || 0;
                        if (chg > 4)  upGt4++;
                        if (chg < -4) dnGt4++;
                    });
                }
                const dayRatio = upGt4 / Math.max(dnGt4, Math.ceil(upGt4 * 0.1), 1);
                const logToday = Math.log(Math.max(0.01, dayRatio));

                // Build historical context (excludes logToday so it can't move the range)
                const stHist = bd.stMomentumHistory || [];
                const adSeries = series.slice(-60);
                let logHistArr;
                if (stHist.length >= 5) {
                    logHistArr = stHist.map(d => d.logRatio);
                } else if (adSeries.length >= 5) {
                    logHistArr = adSeries.map(s => Math.log(Math.max(0.01, (s.advances||1)/(s.declines||1))));
                } else {
                    gdbHtml = ''; return;
                }

                // w1: log(DAY RATIO) — 65%
                // Dampen toward neutral early in day when few stocks have crossed ±4%
                const gt4Total = upGt4 + dnGt4;
                const dampFactor = Math.min(1, gt4Total / 10);
                const w1Raw = normalizeFixed(logToday, logHistArr);
                const w1 = dampFactor * w1Raw + (1 - dampFactor) * 0.5;

                // w2: A/D Net Ratio — 15%
                // Use only historical net ratios to set the range; today's value is clamped into it
                const todayAD = adSeries.length ? adSeries[adSeries.length - 1] : null;
                const adv = todayAD?.advances || 0, dec = todayAD?.declines || 1;
                const net = todayAD?.netAD || 0, total = adv + dec || 1;
                const netRatioHist = adSeries.slice(0, -1).map(s => (s.netAD||0) / ((s.advances||0)+(s.declines||1)));
                const w2 = normalizeFixed(net / total, netRatioHist.length >= 3 ? netRatioHist : [-1, 0, 1]);

                // w3: % Above 5 SMA — 12%
                const sma5Val = liveSma5 !== null && liveSma5 !== undefined ? liveSma5 : null;
                const sma5Hist = (bd.pctAbove5smaHistory || []).slice(-60).map(s => s.pct);
                let w3 = 0.5;
                if (sma5Val !== null && sma5Hist.length >= 3) {
                    w3 = normalizeFixed(sma5Val, sma5Hist); // history-only range
                } else if (sma5Val !== null) {
                    w3 = normalizeFixed(sma5Val, [0, 50, 100]);
                }

                // w4: MCO direction — 8%
                const oscHist = adSeries.slice(0, -1).map(s => s.oscillator || 0);
                const w4 = todayAD && oscHist.length >= 3 ? normalizeFixed(todayAD.oscillator || 0, oscHist) : 0.5;

                // Composite [0..1] → display [-100..+100]
                const gdb = w1 * 0.65 + w2 * 0.15 + w3 * 0.12 + w4 * 0.08;
                const gdbScore = parseFloat(((gdb * 200) - 100).toFixed(1));

                const gdbColor  = gdbScore >= 20 ? '#34d399' : gdbScore <= -20 ? '#f87171' : '#fbbf24';
                const gdbBg     = gdbScore >= 20 ? 'rgba(52,211,153,0.07)' : gdbScore <= -20 ? 'rgba(248,113,113,0.07)' : 'rgba(251,191,36,0.07)';
                const gdbBorder = gdbScore >= 20 ? 'rgba(52,211,153,0.3)'  : gdbScore <= -20 ? 'rgba(248,113,113,0.3)'  : 'rgba(251,191,36,0.3)';
                const gdbLabel  = gdbScore >= 60 ? 'VERY STRONG' : gdbScore >= 20 ? 'STRONG' : gdbScore >= -20 ? 'NEUTRAL' : gdbScore >= -40 ? 'WEAK' : 'VERY WEAK';
                const contextNote = stHist.length >= 5 ? `${stHist.length}d context` : 'A/D proxy';

                // Gauge — half-dial, self-contained, no overflow
                // Semi-circle: startAng=-180 (left), endAng=0 (right), sweep=180°
                // cx centred, cy at bottom so arc fits fully in viewBox
                const gW = 130, gH = 72;
                const r = 44;
                const cx = gW / 2, cy = gH - 10; // bottom margin for tick labels
                const startAng = -180, endAng = 0, sweepDeg = 180;
                const toRad = a => a * Math.PI / 180;
                const px = (a, rad) => cx + rad * Math.cos(toRad(a));
                const py = (a, rad) => cy + rad * Math.sin(toRad(a));
                const arc = (a1, a2, rad) => {
                    const large = (a2 - a1) > 180 ? 1 : 0;
                    return `M ${px(a1,rad).toFixed(2)} ${py(a1,rad).toFixed(2)} A ${rad} ${rad} 0 ${large} 1 ${px(a2,rad).toFixed(2)} ${py(a2,rad).toFixed(2)}`;
                };
                const needleAngle = startAng + gdb * sweepDeg;
                const nX = px(needleAngle, r - 6), nY = py(needleAngle, r - 6);

                // 5 tick marks along the arc
                const tickAng = [-180, -135, -90, -45, 0];
                const tickLbl = ['-100', '-50', '0', '+50', '+100'];
                let ticks = '';
                tickAng.forEach((ta, ti) => {
                    const tx1=px(ta,r+2), ty1=py(ta,r+2);
                    const tx2=px(ta,r-2), ty2=py(ta,r-2);
                    const tlx=px(ta,r+9),  tly=py(ta,r+9);
                    ticks += `<line x1="${tx1.toFixed(1)}" y1="${ty1.toFixed(1)}" x2="${tx2.toFixed(1)}" y2="${ty2.toFixed(1)}" stroke="#334155" stroke-width="1"/>`;
                    ticks += `<text x="${tlx.toFixed(1)}" y="${(tly+1.5).toFixed(1)}" fill="#475569" font-size="4.5" text-anchor="middle">${tickLbl[ti]}</text>`;
                });

                gdbHtml = `
                    <div style="background:${gdbBg};border:1px solid ${gdbBorder};border-radius:8px;padding:10px 14px;">
                        <div style="font-size:8px;color:#64748b;text-transform:uppercase;font-weight:700;letter-spacing:0.08em;margin-bottom:8px;">Today's Breadth Power</div>
                        <div style="display:flex;align-items:center;justify-content:center;gap:16px;">
                            <div style="flex-shrink:0;width:${gW}px;height:${gH}px;overflow:hidden;position:relative;">
                                <svg viewBox="0 0 ${gW} ${gH}" width="${gW}" height="${gH}" style="display:block;position:absolute;top:0;left:0;">
                                    <path d="${arc(startAng, startAng+sweepDeg*0.33, r)}" fill="none" stroke="#f87171" stroke-width="7" stroke-linecap="butt" opacity="0.18"/>
                                    <path d="${arc(startAng+sweepDeg*0.33, startAng+sweepDeg*0.66, r)}" fill="none" stroke="#fbbf24" stroke-width="7" stroke-linecap="butt" opacity="0.18"/>
                                    <path d="${arc(startAng+sweepDeg*0.66, endAng, r)}" fill="none" stroke="#34d399" stroke-width="7" stroke-linecap="butt" opacity="0.18"/>
                                    <path d="${arc(startAng, endAng, r)}" fill="none" stroke="#1e293b" stroke-width="7" stroke-linecap="round"/>
                                    <path d="${arc(startAng, needleAngle, r)}" fill="none" stroke="${gdbColor}" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
                                    ${ticks}
                                    <line x1="${cx}" y1="${cy}" x2="${nX.toFixed(2)}" y2="${nY.toFixed(2)}" stroke="${gdbColor}" stroke-width="2" stroke-linecap="round"/>
                                    <circle cx="${cx}" cy="${cy}" r="3" fill="${gdbColor}" opacity="0.9"/>
                                    <circle cx="${cx}" cy="${cy}" r="1.5" fill="#0f172a"/>
                                </svg>
                            </div>
                            <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;min-width:72px;">
                                <div style="font-size:22px;font-weight:900;font-family:monospace;color:${gdbColor};line-height:1;">${gdbScore >= 0 ? '+' : ''}${gdbScore}</div>
                                <div style="font-size:8px;font-weight:700;color:${gdbColor};letter-spacing:0.08em;text-align:center;">${gdbLabel}</div>
                            </div>
                        </div>
                    </div>`;
            })();

            // Incomplete chart note — shown when adHistory couldn't bridge the full gap
            const actionsUrl = 'https://github.com/dmgalanis/MarketDashboard/actions';
            const incompleteNoteHtml = this._seriesIncomplete
                ? `<div style="background:rgba(148,163,184,0.07);border:1px solid rgba(148,163,184,0.2);border-radius:6px;padding:6px 10px;display:flex;align-items:center;gap:8px;">
                    <span style="font-size:11px;">&#x1F4CA;</span>
                    <div style="flex:1;min-width:0;">
                        <div style="font-size:8px;color:#94a3b8;">Chart history is incomplete — gap too large for local data to bridge.</div>
                        <div style="font-size:8px;color:#64748b;margin-top:1px;">Signals still use latest values. <a href="${actionsUrl}" target="_blank" rel="noopener" style="color:#60a5fa;text-decoration:underline;">Re-run the Action</a> to restore full history.</div>
                    </div>
                   </div>`
                : '';

            this._showModal(`
                <div class="flex justify-between items-center p-3 border-b border-slate-700 bg-slate-900/50">
                    <span class="text-[10px] text-slate-500 uppercase font-bold tracking-wider">Breadth Analysis</span>
                    <button onclick="document.getElementById('trendMapModal').remove()" class="text-slate-500 hover:text-white p-1 transition-colors"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
                <div class="p-4 overflow-y-auto" style="max-height: calc(90vh - 50px);">
                    <div class="space-y-3">
                        ${this._getStalenessWarningHtml()}
                        ${incompleteNoteHtml}
                        ${gdbHtml}
                        <div>
                            <div class="flex justify-between items-center mb-1">
                                <div class="text-[9px] text-slate-500 uppercase font-bold">McClellan Oscillator</div>
                                <span class="text-[8px] text-blue-400 cursor-pointer hover:underline" onclick="app._openExpandedChart('mco')">Expand ↗</span>
                            </div>
                            <div class="bg-slate-900 rounded-lg p-2 border border-slate-700 cursor-pointer hover:border-slate-600 transition-colors" onclick="app._openExpandedChart('mco')">
                                <svg viewBox="0 0 ${chartW} ${chartH + 14}" class="w-full" style="height:${chartH + 14}px">
                                    <line x1="0" y1="${midY}" x2="${chartW}" y2="${midY}" stroke="#334155" stroke-width="0.5"/>
                                    ${bars}
                                    ${dateLabels.join('')}
                                </svg>
                            </div>
                        </div>
                        <div>
                            <div class="flex justify-between items-center mb-1">
                                <div class="text-[9px] text-slate-500 uppercase font-bold">Summation Index + 10 SMA</div>
                                <span class="text-[8px] text-blue-400 cursor-pointer hover:underline" onclick="app._openExpandedChart('mcsi')">Expand ↗</span>
                            </div>
                            <div class="bg-slate-900 rounded-lg p-2 border border-slate-700 cursor-pointer hover:border-slate-600 transition-colors" onclick="app._openExpandedChart('mcsi')">
                                <svg viewBox="0 0 ${chartW} ${chartH + 14}" class="w-full" style="height:${chartH + 14}px">
                                    ${sma10Path ? `<path d="${sma10Path}" fill="none" stroke="#eab308" stroke-width="1.2" stroke-linejoin="round" opacity="0.8"/>` : ''}
                                    <path d="${siPath}" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-linejoin="round"/>
                                    ${dateLabels.join('')}
                                </svg>
                                <div class="flex justify-between text-[8px] font-mono mt-0.5">
                                    <span style="color:#60a5fa">MCSI ${minSi.toFixed(0)}</span>
                                    <div class="flex gap-3"><span style="color:#60a5fa">— MCSI</span><span style="color:#eab308">— 10 SMA</span></div>
                                    <span style="color:#60a5fa">${maxSi.toFixed(0)}</span>
                                </div>
                            </div>
                        </div>
                        ${hlChartHtml}
                        ${sma5ChartHtml}
                        <div class="grid grid-cols-2 gap-2">
                            <div class="bg-slate-900 rounded-lg p-2 text-center border border-slate-700">
                                <div class="text-[9px] text-slate-500 uppercase font-bold">Oscillator (MCO)</div>
                                <div class="text-lg font-black font-mono" style="color:${oscColor}">${mcDisp.oscStr}</div>
                            </div>
                            <div class="bg-slate-900 rounded-lg p-2 text-center border border-slate-700">
                                <div class="text-[9px] text-slate-500 uppercase font-bold">Summation Index</div>
                                <div class="text-lg font-black font-mono" style="color:${siColor}">${mcDisp.siStr}</div>
                            </div>
                        </div>
                        <div>
                            <div class="text-[9px] text-slate-500 uppercase font-bold mb-1">Daily A/D (Last 10)</div>
                            <div class="bg-slate-900 rounded-lg p-2 border border-slate-700">
                                <div class="grid grid-cols-6 gap-1 text-[8px] text-slate-600 uppercase font-bold pb-1 border-b border-slate-700 mb-1">
                                    <span>Date</span><span class="text-right">Adv</span><span class="text-right">Dec</span><span class="text-right">Net</span><span class="text-right">MCO</span><span class="text-right">MCSI</span>
                                </div>
                                ${adTableRows}
                            </div>
                        </div>
                        <div class="text-[9px] text-slate-600">${baselineStatus}</div>
                    </div>
                </div>
            `);
        },

        // =====================================================================
        // STOCK LIST MODAL
        // =====================================================================
        _openStockList(filter) {
            const bd = this.data.settings.breadthData;
            if (!bd || !bd.snapshots) return;
            const titles = {
                advancing: { title: 'Advancing Stocks', color: '#6ee7b7', sort: 'changePct', dir: -1 },
                declining: { title: 'Declining Stocks', color: '#f87171', sort: 'changePct', dir: 1 },
                '52wHigh': { title: 'New 52-Week Highs', color: '#6ee7b7', sort: 'distFromHigh', dir: 1 },
                '52wLow':  { title: 'New 52-Week Lows', color: '#f87171', sort: 'distFromLow', dir: 1 }
            };
            const cfg = titles[filter];
            if (!cfg) return;
            let stocks = Object.entries(bd.snapshots).map(([sym, data]) => ({ sym, ...data }));
            if (filter === 'advancing') stocks = stocks.filter(s => s.advancing === true);
            else if (filter === 'declining') stocks = stocks.filter(s => s.advancing === false && s.price < s.prevClose);
            else if (filter === '52wHigh') stocks = stocks.filter(s => s.isNew52wHigh);
            else if (filter === '52wLow') stocks = stocks.filter(s => s.isNew52wLow);
            stocks.sort((a, b) => ((a[cfg.sort] || 0) - (b[cfg.sort] || 0)) * cfg.dir);

            const rows = stocks.map(s => {
                const chg = s.changePct || 0;
                const chgColor = chg > 0 ? 'color:#6ee7b7' : chg < 0 ? 'color:#f87171' : 'color:#94a3b8';
                const fromHigh = s.distFromHigh !== undefined ? `${(s.distFromHigh * 100).toFixed(1)}%` : '—';
                const fromLow = s.distFromLow !== undefined ? `${(s.distFromLow * 100).toFixed(1)}%` : '—';
                return `<div class="flex items-center justify-between py-1.5 border-b border-slate-800/30">
                    <div class="flex items-center gap-1 min-w-0">
                        <span class="text-[11px] font-bold text-white w-11 flex-shrink-0">${s.sym}</span>
                        <span class="text-[10px] font-mono text-slate-300 w-14 text-right flex-shrink-0">${s.price.toFixed(2)}</span>
                    </div>
                    <div class="flex items-center gap-0 text-[10px] font-mono">
                        <span style="${chgColor}" class="font-bold w-14 text-right">${chg > 0 ? '+' : ''}${chg.toFixed(2)}%</span>
                        <span class="text-slate-400 w-14 text-right" title="From 52w High">↑${fromHigh}</span>
                        <span class="text-slate-400 w-14 text-right" title="From 52w Low">↓${fromLow}</span>
                    </div>
                </div>`;
            }).join('');

            this._showModal(`
                <div class="flex justify-between items-center p-3 border-b border-slate-700 bg-slate-900/50">
                    <span class="text-sm font-bold" style="color:${cfg.color}">${cfg.title} (${stocks.length})</span>
                    <button onclick="document.getElementById('trendMapModal').remove()" class="text-slate-500 hover:text-white p-1 transition-colors"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
                <div class="p-4 overflow-y-auto" style="max-height: calc(90vh - 50px);">
                    <div class="flex items-center justify-between text-[8px] text-slate-500 uppercase font-bold pb-1 mb-1 border-b border-slate-700">
                        <div class="flex items-center gap-1"><span class="w-11">Ticker</span><span class="w-14 text-right">Price</span></div>
                        <div class="flex items-center"><span class="w-14 text-right">Day%</span><span class="w-14 text-right">↑High</span><span class="w-14 text-right">↓Low</span></div>
                    </div>
                    ${stocks.length === 0 ? '<div class="text-center text-slate-500 text-xs py-4">No stocks match</div>' : rows}
                </div>
            `);
        },

        // =====================================================================
        // RENDER: MAIN PANEL
        // =====================================================================
        renderTrendMap() {
            const container = document.getElementById('trendMapPanel');
            if (!container) return;
            const tm = this.data.settings.trendMap;
            if (!tm) { this.initTrendMap(); return this.renderTrendMap(); }

            const mr = this.getTrendMapColour(), css = this._trendMapColourCSS(mr.colour);
            const lf = tm.lastFetch ? new Date(tm.lastFetch).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : 'Never';
            const tradingDaysLeft = this._getTradingDaysRemaining();

            // Build signal rows
            const labels = [
                { num: 1, full: 'QQQE McClellan Summation Index (MCSI) in an uptrend?', auto: true },
                { num: 2, full: 'QQQE above a rising 5 SMA?', auto: true },
                { num: 3, full: 'Daily Buy Signal? (QQQE above 10/20 SMA + 10SMA > 20SMA)', auto: true },
                { num: 4, full: 'Weekly Buy Signal? (QQQE price above 10 & 20 WMA)', auto: true },
                { num: 5, full: 'Gained traction on last few trades?', auto: false },
                { num: 6, full: 'QQQE net 52-Week High/Low indicator trending positive?', auto: true },
                { num: 7, full: 'McClellan Oscillator out of overbought territory?', auto: true }
            ];
            const signalRows = labels.map(s => {
                const val = this.getTrendMapSignal(s.num);
                const ov = tm.overrides[`p${s.num}`] !== null && tm.overrides[`p${s.num}`] !== undefined;
                let vc, vt;
                if (val === 'YES')     { vc = 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30'; vt = 'YES'; }
                else if (val === 'NO') { vc = 'bg-red-500/20 text-red-400 border-red-500/30'; vt = 'NO'; }
                else if (val === 'ATTEMPT') { vc = 'bg-amber-500/20 text-amber-400 border-amber-500/30'; vt = 'ATTEMPT'; }
                else { vc = 'bg-slate-700/50 text-slate-500 border-slate-600'; vt = '—'; }
                return `<div class="flex items-center justify-between py-1.5 ${s.num<7?'border-b border-slate-800/50':''}">
                    <div class="flex items-center gap-2 flex-1 min-w-0">
                        <span class="text-[10px] text-slate-600 font-mono w-3 flex-shrink-0">${s.num}</span>
                        <span class="text-[11px] text-slate-300 truncate" title="${s.full}">${s.full}</span>
                    </div>
                    <div class="flex items-center gap-1.5 flex-shrink-0">
                        <button onclick="app.toggleTrendMapSignal(${s.num})" class="px-2.5 py-0.5 rounded text-[10px] font-bold border transition-all active:scale-95 ${vc}" title="Click to toggle">${vt}</button>
                    </div>
                </div>`;
            }).join('');

            // Exposure guidance
            const icons = { GREEN: 'shield-check', YELLOW: 'shield-alert', AMBER: 'alert-triangle', ORANGE: 'shield-off', RED: 'octagon', GREY: 'help-circle' };
            const defaults = this._trendMapDefaults().exposureRules;
            const rules = tm.exposureRules || defaults;
            const expText = rules[mr.colour] || defaults[mr.colour] || 'Fetch QQQE data to generate a reading.';

            // Breadth summary
            let breadthHtml = '';
            const bd = this.data.settings.breadthData;
            if (bd && bd.lastBreadthFetch) {
                const total = bd.componentCount || 0;
                const advPct = total > 0 ? ((bd.advancers / total) * 100) : 0;
                const decPct = total > 0 ? ((bd.decliners / total) * 100) : 0;
                const fetchTime = new Date(bd.lastBreadthFetch).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                const advW = total > 0 ? Math.max(2, advPct) : 50;
                const decW = total > 0 ? Math.max(2, decPct) : 50;
                breadthHtml = `
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <div class="text-[9px] text-slate-500 uppercase font-bold tracking-wide">QQQE Breadth</div>
                            <span class="text-[8px] text-slate-600 font-mono">${total} stocks · ${fetchTime}</span>
                        </div>
                        <div class="mb-2">
                            <div class="flex rounded-full overflow-hidden h-2.5 mb-1" style="background:#1e293b;">
                                <div style="width:${advW.toFixed(0)}%;background:linear-gradient(90deg,#059669,#34d399);" class="transition-all"></div>
                                <div style="width:${decW.toFixed(0)}%;background:linear-gradient(90deg,#f87171,#dc2626);margin-left:auto;" class="transition-all"></div>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-[10px] font-bold" style="color:#6ee7b7">${bd.advancers} Adv <span class="text-[8px] font-normal opacity-50">(${advPct.toFixed(0)}%)</span></span>
                                <span class="text-[10px] font-bold" style="color:#f87171">${bd.decliners} Dec <span class="text-[8px] font-normal opacity-50">(${decPct.toFixed(0)}%)</span></span>
                            </div>
                        </div>
                        <button onclick="app._openMcClellanDetail()" class="w-full mt-1 py-1.5 rounded-lg text-[10px] font-bold tracking-wide transition-all active:scale-95 hover:opacity-90" style="background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.2);color:#93c5fd;">Breadth Analysis</button>
                    </div>`;
            }

            container.innerHTML = `
                <div class="rounded-xl overflow-hidden" style="border:1px solid;${css.panelBorder}">
                    <div class="tm-banner tm-shimmer px-4 py-3 flex items-center justify-between" style="${css.banner}${css.bannerBorder}">
                        <div class="flex items-center gap-3" style="position:relative;z-index:1;">
                            <div class="tm-orb w-4 h-4 flex-shrink-0" style="${css.orb}"></div>
                            <div class="rounded-md px-2 py-1" style="background:rgba(0,0,0,0.3);backdrop-filter:blur(2px);">
                                <div class="text-base font-black leading-none tracking-wide" style="${css.text}${css.textGlow}">${mr.colour}</div>
                            </div>
                        </div>
                        <div class="flex items-center gap-2" style="position:relative;z-index:1;">
                            <div class="text-right rounded-md px-2 py-1" style="background:rgba(0,0,0,0.3);backdrop-filter:blur(2px);">
                                <div class="text-[7px] uppercase tracking-wider font-bold leading-none" style="color:rgba(255,255,255,0.45);">Trading Days Left</div>
                                <div class="text-[11px] font-black font-mono leading-none" style="color:rgba(255,255,255,0.75);">${tradingDaysLeft}</div>
                            </div>
                            <div class="flex items-center justify-center w-7 h-7 rounded-md" style="background:rgba(0,0,0,0.3);" title="${this._isMarketOpenCached() ? 'Auto-refreshing every 60s' : 'Market closed — auto-refresh paused'}">
                                <span id="autoPollDot" class="${this._isMarketOpenCached() ? 'live-dot' : ''} w-2 h-2 rounded-full" style="background:${this._isMarketOpenCached() ? '#34d399' : '#475569'};display:block;"></span>
                            </div>
                        </div>
                    </div>
                    <div class="px-4 py-1.5" style="${css.actionBg}border-top:none;"><div class="text-[10px] font-bold tracking-wide" style="${css.text}">${mr.action}</div></div>
                    <div style="background:rgba(15,23,42,0.6);">
                        <div class="w-full px-4 py-2 flex items-center">
                            <span class="text-[9px] text-slate-500 uppercase tracking-wider font-bold">Signal Detail</span>
                        </div>
                        <div id="detailPanel" style="padding:0 1rem 0.75rem;">
                            <div class="mt-1">${signalRows}</div>
                            <div class="mt-3 pt-2 border-t border-slate-800/50">
                                <div class="flex justify-between items-center mb-1.5">
                                    <div class="text-[9px] text-slate-600 uppercase font-bold flex items-center gap-1"><i data-lucide="${icons[mr.colour] || 'help-circle'}" class="w-3 h-3"></i> Exposure Rules</div>
                                </div>
                                <div class="p-2 rounded text-[10px] text-slate-300 leading-relaxed" style="${css.actionBg} border-top:none;">${expText}</div>
                            </div>
                        </div>
                    </div>
                </div>
                ${breadthHtml ? `
                <div class="rounded-xl overflow-hidden mt-2" style="border:1px solid;${css.panelBorder}">
                    <div style="background:rgba(15,23,42,0.6);padding:0.75rem 1rem;">
                        ${breadthHtml}
                    </div>
                </div>` : ''}`;
            lucide.createIcons();
        },

        // =====================================================================
        // EXPANDED FULL-SCREEN CHART VIEW
        // =====================================================================
        _expandedChartType: null,
        _expandedChartFullSeries: null,
        _expandedChartPeriod: '1Y',
        _orientationHandler: null,
        _orientationRO: null,

        _openExpandedChart(chartType) {
            const bd = this.data.settings.breadthData;

            // hl52 uses netHighLowHistory, sma5 uses pctAbove5smaHistory, others use McClellan series
            let series;
            if (chartType === 'hl52') {
                series = this._getHlHistory(bd);
                if (!series.length) return;
            } else if (chartType === 'sma5') {
                if (!bd.pctAbove5smaHistory || bd.pctAbove5smaHistory.length === 0) {
                    bd.pctAbove5smaHistory = this._loadSma5History();
                }
                series = (bd?.pctAbove5smaHistory || []).slice();
                const _todaySma5 = new Date().toLocaleDateString('en-CA', { timeZone: 'America/New_York' });
                const _fetchedTodaySma5 = bd?.lastBreadthFetch ? new Date(bd.lastBreadthFetch).toLocaleDateString('en-CA', { timeZone: 'America/New_York' }) === _todaySma5 : false;
                if ((this._isMarketOpenCached() || this._isTradingDaySessionDone()) && _fetchedTodaySma5 && bd?.pctAbove5sma !== null && bd?.pctAbove5sma !== undefined) {
                    const last = series[series.length - 1];
                    if (!last || last.date !== _todaySma5) series = [...series, { date: _todaySma5, pct: bd.pctAbove5sma }];
                    else series[series.length - 1] = { ...last, pct: bd.pctAbove5sma };
                }
                if (!series.length) return;
            } else {
                series = this._buildMcClellanSeries();
                if (!series.length) return;
            }

            // Remove existing modals
            document.getElementById('trendMapModal')?.remove();
            // Clean up any previous ResizeObserver before opening a new chart
            this._cleanupExpandedChart();

            this._expandedChartType = chartType;
            this._expandedChartFullSeries = series;
            this._expandedChartPeriod = (chartType === 'hl52') ? 'ALL' : '3M';

            const modal = document.createElement('div');
            modal.id = 'breadthExpandedModal';

            let title, valColor, valStr, latestDate;
            if (chartType === 'hl52') {
                title = '52-Week H/L Oscillator';
                const latest = series[series.length - 1];
                const val = latest.net;
                valColor = val > 0 ? '#6ee7b7' : val < 0 ? '#f87171' : '#94a3b8';
                valStr = `${val > 0 ? '+' : ''}${val} (${latest.highs}H / ${latest.lows}L)`;
                latestDate = latest.date;
            } else if (chartType === 'sma5') {
                title = '% of Stocks Above 5 SMA';
                const latest = series[series.length - 1];
                const val = latest.pct;
                valColor = val >= 75 ? '#f87171' : val <= 25 ? '#6ee7b7' : '#a78bfa';
                valStr = `${val.toFixed(1)}%`;
                latestDate = latest.date;
            } else {
                title = chartType === 'mco' ? 'McClellan Oscillator' : 'Summation Index + 10 SMA';
                const latest = series[series.length - 1];
                const mcDisp = this._getMcDisplay();
                const val = chartType === 'mco' ? mcDisp.osc : mcDisp.si;
                valColor = val >= 0 ? '#6ee7b7' : '#f87171';
                valStr = chartType === 'mco' ? mcDisp.oscStr : mcDisp.siStr;
                latestDate = mcDisp.isLive ? `${latest.date} (est.)` : latest.date;
            }

            modal.innerHTML = `
                <div id="expandedChartHeader">
                    <div style="display:flex;align-items:center;gap:10px;min-width:0;">
                        <button id="expandedChartBack" style="flex-shrink:0;background:rgba(30,41,59,0.8);border:1px solid #334155;border-radius:8px;color:#94a3b8;padding:6px;display:flex;align-items:center;justify-content:center;transition:all .15s;-webkit-tap-highlight-color:transparent;" title="Back">
                            <i data-lucide="arrow-left" style="width:16px;height:16px;"></i>
                        </button>
                        <div style="min-width:0;">
                            <div class="chart-title-text" style="font-size:12px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${title}</div>
                            <div id="expandedChartSubtitle" style="font-size:9px;color:#64748b;font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
                        </div>
                    </div>
                    <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">
                        <div style="text-align:right;">
                            <div class="chart-val-text" style="font-size:18px;font-weight:900;font-family:monospace;color:${valColor};line-height:1.1;">${valStr}</div>
                            <div style="font-size:9px;color:#64748b;">${latestDate}</div>
                        </div>
                        <button id="expandedChartRefreshBtn" style="display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;background:#1e293b;border:1px solid #334155;color:#94a3b8;flex-shrink:0;transition:all .15s;-webkit-tap-highlight-color:transparent;" title="Refresh data">
                            <i data-lucide="refresh-cw" style="width:16px;height:16px;"></i>
                        </button>
                    </div>
                </div>
                <div id="expandedChartZoom"></div>
                <div id="expandedChartDataBar"></div>
                <div id="expandedChartArea"></div>
                <div id="expandedChartTooltip" class="hidden"></div>
            `;

            document.body.appendChild(modal);
            lucide.createIcons();

            document.getElementById('expandedChartBack').addEventListener('click', () => {
                this._cleanupExpandedChart();
                modal.remove();
                this._openMcClellanDetail();
            });

            document.getElementById('expandedChartRefreshBtn').addEventListener('click', async () => {
                const btn = document.getElementById('expandedChartRefreshBtn');
                if (btn) { btn.disabled = true; btn.style.opacity = '0.5'; btn.innerHTML = '<i data-lucide="loader-2" style="width:16px;height:16px;animation:spin 1s linear infinite;"></i>'; lucide.createIcons(); }
                const savedChartType = this._expandedChartType;
                await this.fetchTrendMapData();
                this._cleanupExpandedChart();
                modal.remove();
                this._openExpandedChart(savedChartType);
            });

            this._renderExpandedZoom();
            requestAnimationFrame(() => this._renderExpandedChart(chartType, this._getZoomedSeries()));

            // ── Orientation change: use ResizeObserver so the chart redraws
            // exactly once the container has finished settling to its new size.
            // This eliminates the two-step jump caused by fixed setTimeout delays.
            let resizeDebounce = null;
            let lastW = 0, lastH = 0;

            const ro = new ResizeObserver((entries) => {
                const entry = entries[0];
                if (!entry) return;
                const newW = Math.floor(entry.contentRect.width);
                const newH = Math.floor(entry.contentRect.height);
                // Ignore sub-pixel noise and identical sizes
                if (Math.abs(newW - lastW) < 2 && Math.abs(newH - lastH) < 2) return;
                lastW = newW; lastH = newH;

                // Debounce: wait until the size has been stable for one frame
                // before redrawing, so we only paint the final settled dimensions
                if (resizeDebounce) cancelAnimationFrame(resizeDebounce);
                resizeDebounce = requestAnimationFrame(() => {
                    if (!document.getElementById('breadthExpandedModal')) return;
                    const area = document.getElementById('expandedChartArea');
                    if (area) area.innerHTML = '';
                    this._renderExpandedZoom();
                    this._renderExpandedChart(this._expandedChartType, this._getZoomedSeries());
                });
            });

            const chartArea = document.getElementById('expandedChartArea');
            if (chartArea) ro.observe(chartArea);

            this._orientationHandler = () => ro.disconnect();
            this._orientationRO = ro;
        },

        _cleanupExpandedChart() {
            if (this._orientationRO) {
                this._orientationRO.disconnect();
                this._orientationRO = null;
            }
            this._orientationHandler = null;
        },

        _getZoomedSeries() {
            const full = this._expandedChartFullSeries;
            if (!full || !full.length) return [];
            const period = this._expandedChartPeriod;
            const isHL = this._expandedChartType === 'hl52';
            const isSma5 = this._expandedChartType === 'sma5';
            const daysMap = (isHL || isSma5)
                ? { '1M': 21, '3M': 63, '6M': 126, 'ALL': full.length }
                : { '1M': 21, '3M': 63, '6M': 126, '1Y': 252, 'ALL': full.length };
            const days = daysMap[period] || full.length;
            return full.slice(-Math.min(days, full.length));
        },

        _renderExpandedZoom() {
            const container = document.getElementById('expandedChartZoom');
            if (!container) return;
            const isHL = this._expandedChartType === 'hl52';
            const isSma5 = this._expandedChartType === 'sma5';
            const periods = (isHL || isSma5) ? ['1M', '3M', '6M', 'ALL'] : ['1M', '3M', '6M', '1Y', 'ALL'];
            container.innerHTML = periods.map(p => {
                const active = p === this._expandedChartPeriod;
                const activeSt = active
                    ? 'background:#2563eb;color:#fff;border-color:#3b82f6;'
                    : 'background:#1e293b;color:#94a3b8;border-color:#334155;';
                return `<button onclick="app._setExpandedZoom('${p}')" style="padding:5px 14px;border-radius:6px;font-size:10px;font-weight:700;border:1px solid;transition:all .15s;-webkit-tap-highlight-color:transparent;flex-shrink:0;${activeSt}">${p}</button>`;
            }).join('');

            const zoomed = this._getZoomedSeries();
            const sub = document.getElementById('expandedChartSubtitle');
            if (sub && zoomed.length) {
                sub.textContent = `${zoomed[0].date} — ${zoomed[zoomed.length - 1].date} · ${zoomed.length} days`;
            }
        },

        _setExpandedZoom(period) {
            this._expandedChartPeriod = period;
            this._renderExpandedZoom();
            const container = document.getElementById('expandedChartArea');
            if (container) container.innerHTML = '';
            requestAnimationFrame(() => this._renderExpandedChart(this._expandedChartType, this._getZoomedSeries()));
        },

        _buildMonthLabels(series, padL, plotW) {
            const labels = [];
            let lastMonth = '';
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            series.forEach((s, i) => {
                const m = s.date.slice(0, 7);
                if (m !== lastMonth) {
                    lastMonth = m;
                    const x = padL + (i / (series.length - 1 || 1)) * plotW;
                    const parts = s.date.split('-');
                    const label = months[parseInt(parts[1], 10) - 1] + (parts[1] === '01' ? ' ' + parts[0].slice(2) : '');
                    labels.push({ x, label, origIdx: i });
                }
            });
            return labels;
        },

        _renderExpandedChart(chartType, series) {
            const container = document.getElementById('expandedChartArea');
            if (!container) return;

            const rect = container.getBoundingClientRect();
            const W = Math.floor(rect.width);
            const H = Math.floor(rect.height);
            if (W < 50 || H < 50) return; // layout not ready yet — ResizeObserver will re-trigger

            // Adaptive padding for landscape / small-height screens
            const isLandscape = W > H;
            const padL = 44, padR = 10;
            const padT = isLandscape ? 10 : 16;
            const padB = isLandscape ? 22 : 28;
            const axisFontSize = (isLandscape && H < 420) ? 8 : 9;
            const plotW = W - padL - padR;
            const plotH = H - padT - padB;

            const monthLabels = this._buildMonthLabels(series, padL, plotW);

            const niceStep = (range) => {
                const rough = range / 5;
                const mag = Math.pow(10, Math.floor(Math.log10(rough)));
                const norm = rough / mag;
                if (norm <= 1) return mag;
                if (norm <= 2) return 2 * mag;
                if (norm <= 5) return 5 * mag;
                return 10 * mag;
            };

            let svgContent = '';

            if (chartType === 'hl52') {
                // ── 52-Week H/L Oscillator (bar chart) ──
                const netValues = series.map(s => s.net);
                const maxAbs = Math.max(Math.abs(Math.min(...netValues)), Math.abs(Math.max(...netValues)), 1);
                const yMax = maxAbs * 1.1;
                const midY = padT + plotH / 2;

                // Grid lines
                const yStep = niceStep(yMax);
                for (let v = yStep; v <= yMax; v += yStep) {
                    const yPos = midY - (v / yMax) * (plotH / 2);
                    const yNeg = midY + (v / yMax) * (plotH / 2);
                    svgContent += `<line x1="${padL}" y1="${yPos.toFixed(1)}" x2="${W - padR}" y2="${yPos.toFixed(1)}" stroke="#1e293b" stroke-width="0.5"/>`;
                    svgContent += `<line x1="${padL}" y1="${yNeg.toFixed(1)}" x2="${W - padR}" y2="${yNeg.toFixed(1)}" stroke="#1e293b" stroke-width="0.5"/>`;
                    svgContent += `<text x="${padL - 4}" y="${(yPos + 3).toFixed(1)}" fill="#64748b" font-size="${axisFontSize}" text-anchor="end" font-family="monospace">+${v.toFixed(0)}</text>`;
                    svgContent += `<text x="${padL - 4}" y="${(yNeg + 3).toFixed(1)}" fill="#64748b" font-size="${axisFontSize}" text-anchor="end" font-family="monospace">-${v.toFixed(0)}</text>`;
                }
                // Zero line
                svgContent += `<line x1="${padL}" y1="${midY.toFixed(1)}" x2="${W - padR}" y2="${midY.toFixed(1)}" stroke="#475569" stroke-width="0.8"/>`;
                svgContent += `<text x="${padL - 4}" y="${(midY + 3).toFixed(1)}" fill="#64748b" font-size="${axisFontSize}" text-anchor="end" font-family="monospace">0</text>`;

                // Bars
                const barGap = 0.5;
                const barW = Math.max(1, (plotW / series.length) - barGap);
                series.forEach((s, i) => {
                    const x = padL + i * (barW + barGap);
                    const h = Math.abs(s.net) / yMax * (plotH / 2);
                    const y = s.net >= 0 ? midY - h : midY;
                    const fill = s.net >= 0 ? '#34d399' : '#f87171';
                    svgContent += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(0.5, h).toFixed(1)}" fill="${fill}" rx="0.5"/>`;
                });

                // Month labels
                monthLabels.forEach(m => {
                    svgContent += `<line x1="${m.x.toFixed(1)}" y1="${padT}" x2="${m.x.toFixed(1)}" y2="${H - padB}" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="2,3"/>`;
                    svgContent += `<text x="${m.x.toFixed(1)}" y="${H - padB + (axisFontSize + 4)}" fill="#64748b" font-size="${axisFontSize}" text-anchor="middle">${m.label}</text>`;
                });

            } else if (chartType === 'sma5') {
                // ── % of Stocks Above 5 SMA (line chart with OB/OS bands) ──
                const pctVals = series.map(s => s.pct);
                const minPct = Math.max(0, Math.min(...pctVals) - 5);
                const maxPct = Math.min(100, Math.max(...pctVals) + 5);
                const pctRange = maxPct - minPct || 1;
                // Extra right padding so OB/OS labels aren't clipped
                const sma5PadR = 28;
                const sma5PlotW = W - padL - sma5PadR;
                const toY = (v) => padT + plotH - ((v - minPct) / pctRange * plotH);
                const toX = (i) => padL + (i / (series.length - 1 || 1)) * sma5PlotW;

                // Grid lines
                const yStep = niceStep(pctRange);
                const gridStart = Math.ceil(minPct / yStep) * yStep;
                for (let v = gridStart; v <= maxPct; v += yStep) {
                    const y = toY(v);
                    svgContent += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W - sma5PadR}" y2="${y.toFixed(1)}" stroke="#1e293b" stroke-width="0.5"/>`;
                    svgContent += `<text x="${padL - 4}" y="${(y + 3).toFixed(1)}" fill="#64748b" font-size="${axisFontSize}" text-anchor="end" font-family="monospace">${v.toFixed(0)}</text>`;
                }

                // OB zone fill + line + labels (drawn before line so line renders on top)
                const obY = toY(75), topY = toY(Math.min(100, maxPct));
                if (obY > padT && obY < padT + plotH) {
                    svgContent += `<rect x="${padL}" y="${Math.max(padT, topY).toFixed(1)}" width="${sma5PlotW}" height="${(obY - Math.max(padT, topY)).toFixed(1)}" fill="rgba(248,113,113,0.07)"/>`;
                    svgContent += `<line x1="${padL}" y1="${obY.toFixed(1)}" x2="${W - sma5PadR}" y2="${obY.toFixed(1)}" stroke="#f87171" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.8"/>`;
                    svgContent += `<text x="${padL - 4}" y="${(obY + 3).toFixed(1)}" fill="#f87171" font-size="${axisFontSize}" text-anchor="end" font-family="monospace" font-weight="700">75</text>`;
                    svgContent += `<text x="${W - sma5PadR + 4}" y="${(obY + 3).toFixed(1)}" fill="#f87171" font-size="${axisFontSize}" font-weight="700" font-family="monospace">OB</text>`;
                }

                // OS zone fill + line + labels
                const osY = toY(25), botY = toY(Math.max(0, minPct));
                if (osY > padT && osY < padT + plotH) {
                    svgContent += `<rect x="${padL}" y="${osY.toFixed(1)}" width="${sma5PlotW}" height="${(Math.min(padT + plotH, botY) - osY).toFixed(1)}" fill="rgba(110,231,183,0.07)"/>`;
                    svgContent += `<line x1="${padL}" y1="${osY.toFixed(1)}" x2="${W - sma5PadR}" y2="${osY.toFixed(1)}" stroke="#6ee7b7" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.8"/>`;
                    svgContent += `<text x="${padL - 4}" y="${(osY + 3).toFixed(1)}" fill="#6ee7b7" font-size="${axisFontSize}" text-anchor="end" font-family="monospace" font-weight="700">25</text>`;
                    svgContent += `<text x="${W - sma5PadR + 4}" y="${(osY + 3).toFixed(1)}" fill="#6ee7b7" font-size="${axisFontSize}" font-weight="700" font-family="monospace">OS</text>`;
                }

                // 50% midline
                const mid50Y = toY(50);
                if (mid50Y > padT && mid50Y < padT + plotH) {
                    svgContent += `<line x1="${padL}" y1="${mid50Y.toFixed(1)}" x2="${W - sma5PadR}" y2="${mid50Y.toFixed(1)}" stroke="#475569" stroke-width="0.5" opacity="0.6"/>`;
                    svgContent += `<text x="${padL - 4}" y="${(mid50Y + 3).toFixed(1)}" fill="#64748b" font-size="${axisFontSize}" text-anchor="end" font-family="monospace">50</text>`;
                }

                // Month labels
                monthLabels.forEach(m => {
                    // Recalculate x using sma5PlotW
                    const mx = padL + (m.origIdx / (series.length - 1 || 1)) * sma5PlotW;
                    svgContent += `<line x1="${mx.toFixed(1)}" y1="${padT}" x2="${mx.toFixed(1)}" y2="${H - padB}" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="2,3"/>`;
                    svgContent += `<text x="${mx.toFixed(1)}" y="${H - padB + (axisFontSize + 4)}" fill="#64748b" font-size="${axisFontSize}" text-anchor="middle">${m.label}</text>`;
                });

                // Line path
                let linePath = '';
                series.forEach((s, i) => { linePath += (i === 0 ? 'M' : 'L') + `${toX(i).toFixed(1)},${toY(s.pct).toFixed(1)}`; });
                const latestPct = series[series.length - 1].pct;
                const lineColor = latestPct >= 75 ? '#f87171' : latestPct <= 25 ? '#6ee7b7' : '#a78bfa';
                svgContent += `<path d="${linePath}" fill="none" stroke="${lineColor}" stroke-width="1.8" stroke-linejoin="round"/>`;

                // Latest dot — pulsing if market open, static if closed
                const lastX = toX(series.length - 1), lastY = toY(latestPct);
                const dotColor = latestPct >= 75 ? '#f87171' : latestPct <= 25 ? '#6ee7b7' : '#a78bfa';
                const mktOpenSma5 = this._isMarketOpenCached();
                if (mktOpenSma5) {
                    svgContent += `
                        <circle cx="${lastX.toFixed(1)}" cy="${lastY.toFixed(1)}" r="6" fill="${dotColor}" opacity="0.12">
                            <animate attributeName="r" values="6;18;6" dur="2s" repeatCount="indefinite"/>
                            <animate attributeName="opacity" values="0.25;0;0.25" dur="2s" repeatCount="indefinite"/>
                        </circle>
                        <circle cx="${lastX.toFixed(1)}" cy="${lastY.toFixed(1)}" r="5" fill="${dotColor}" opacity="0.35">
                            <animate attributeName="r" values="5;12;5" dur="2s" repeatCount="indefinite" begin="0.15s"/>
                            <animate attributeName="opacity" values="0.45;0;0.45" dur="2s" repeatCount="indefinite" begin="0.15s"/>
                        </circle>
                        <circle cx="${lastX.toFixed(1)}" cy="${lastY.toFixed(1)}" r="4" fill="${dotColor}" opacity="0.6">
                            <animate attributeName="r" values="4;7;4" dur="2s" repeatCount="indefinite" begin="0.3s"/>
                            <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2s" repeatCount="indefinite" begin="0.3s"/>
                        </circle>
                        <circle cx="${lastX.toFixed(1)}" cy="${lastY.toFixed(1)}" r="4" fill="${dotColor}"/>
                    `;
                } else {
                    svgContent += `<circle cx="${lastX.toFixed(1)}" cy="${lastY.toFixed(1)}" r="3.5" fill="${dotColor}"/>`;
                }

            } else if (chartType === 'mco') {
                const oscValues = series.map(s => s.oscillator);
                const maxAbs = Math.max(Math.abs(Math.min(...oscValues)), Math.abs(Math.max(...oscValues)), 1);
                const yMax = maxAbs * 1.1;
                const midY = padT + plotH / 2;

                const yStep = niceStep(yMax);
                for (let v = 0; v <= yMax; v += yStep) {
                    if (v === 0) continue;
                    const yPos = midY - (v / yMax) * (plotH / 2);
                    const yNeg = midY + (v / yMax) * (plotH / 2);
                    svgContent += `<line x1="${padL}" y1="${yPos.toFixed(1)}" x2="${W - padR}" y2="${yPos.toFixed(1)}" stroke="#1e293b" stroke-width="0.5"/>`;
                    svgContent += `<line x1="${padL}" y1="${yNeg.toFixed(1)}" x2="${W - padR}" y2="${yNeg.toFixed(1)}" stroke="#1e293b" stroke-width="0.5"/>`;
                    svgContent += `<text x="${padL - 4}" y="${(yPos + 3).toFixed(1)}" fill="#64748b" font-size="${axisFontSize}" text-anchor="end" font-family="monospace">+${v.toFixed(0)}</text>`;
                    svgContent += `<text x="${padL - 4}" y="${(yNeg + 3).toFixed(1)}" fill="#64748b" font-size="${axisFontSize}" text-anchor="end" font-family="monospace">-${v.toFixed(0)}</text>`;
                }

                svgContent += `<line x1="${padL}" y1="${midY.toFixed(1)}" x2="${W - padR}" y2="${midY.toFixed(1)}" stroke="#475569" stroke-width="0.5"/>`;
                svgContent += `<text x="${padL - 4}" y="${(midY + 3).toFixed(1)}" fill="#64748b" font-size="${axisFontSize}" text-anchor="end" font-family="monospace">0</text>`;

                const barGap = 0.5;
                const barW = Math.max(1, (plotW / series.length) - barGap);
                series.forEach((s, i) => {
                    const x = padL + i * (barW + barGap);
                    const h = Math.abs(s.oscillator) / yMax * (plotH / 2);
                    const y = s.oscillator >= 0 ? midY - h : midY;
                    const fill = s.oscillator >= 0 ? '#34d399' : '#f87171';
                    svgContent += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(0.5, h).toFixed(1)}" fill="${fill}" rx="0.5"/>`;
                });

                monthLabels.forEach(m => {
                    svgContent += `<line x1="${m.x.toFixed(1)}" y1="${padT}" x2="${m.x.toFixed(1)}" y2="${H - padB}" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="2,3"/>`;
                    svgContent += `<text x="${m.x.toFixed(1)}" y="${H - padB + (axisFontSize + 4)}" fill="#64748b" font-size="${axisFontSize}" text-anchor="middle">${m.label}</text>`;
                });

            } else {
                const siValues = series.map(s => s.summationIndex);
                const minSi = Math.min(...siValues), maxSi = Math.max(...siValues);
                const siPad = (maxSi - minSi) * 0.08 || 5;
                const yMin = minSi - siPad, yMaxV = maxSi + siPad;
                const yRange = yMaxV - yMin;

                const toY = (v) => padT + plotH - ((v - yMin) / yRange * plotH);
                const toX = (i) => padL + (i / (series.length - 1 || 1)) * plotW;

                const yStep = niceStep(yRange);
                const gridStart = Math.ceil(yMin / yStep) * yStep;
                for (let v = gridStart; v <= yMaxV; v += yStep) {
                    const y = toY(v);
                    svgContent += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W - padR}" y2="${y.toFixed(1)}" stroke="#1e293b" stroke-width="0.5"/>`;
                    svgContent += `<text x="${padL - 4}" y="${(y + 3).toFixed(1)}" fill="#64748b" font-size="${axisFontSize}" text-anchor="end" font-family="monospace">${v.toFixed(0)}</text>`;
                }

                if (yMin <= 0 && yMaxV >= 0) {
                    const y0 = toY(0);
                    svgContent += `<line x1="${padL}" y1="${y0.toFixed(1)}" x2="${W - padR}" y2="${y0.toFixed(1)}" stroke="#475569" stroke-width="0.5" stroke-dasharray="4,2"/>`;
                }

                let smaPath = '';
                series.forEach((s, i) => {
                    if (i >= 9) {
                        let sum = 0;
                        for (let j = i - 9; j <= i; j++) sum += series[j].summationIndex;
                        const avg = sum / 10;
                        smaPath += (i === 9 ? 'M' : 'L') + `${toX(i).toFixed(1)},${toY(avg).toFixed(1)}`;
                    }
                });
                if (smaPath) {
                    svgContent += `<path d="${smaPath}" fill="none" stroke="#eab308" stroke-width="1.5" stroke-linejoin="round" opacity="0.7"/>`;
                }

                let siPath = '';
                series.forEach((s, i) => {
                    siPath += (i === 0 ? 'M' : 'L') + `${toX(i).toFixed(1)},${toY(s.summationIndex).toFixed(1)}`;
                });
                svgContent += `<path d="${siPath}" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linejoin="round"/>`;

                monthLabels.forEach(m => {
                    svgContent += `<line x1="${m.x}" y1="${padT}" x2="${m.x}" y2="${H - padB}" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="2,3"/>`;
                    svgContent += `<text x="${m.x}" y="${H - padB + (axisFontSize + 4)}" fill="#64748b" font-size="${axisFontSize}" text-anchor="middle">${m.label}</text>`;
                });

                const lastY = toY(series[series.length - 1].summationIndex);
                const lastVal = series[series.length - 1].summationIndex;
                const lastColor = lastVal >= 0 ? '#6ee7b7' : '#f87171';
                const lastCx = toX(series.length - 1);
                const mktOpen = this._isMarketOpenCached();

                if (mktOpen) {
                    // Pulsing live dot — three ripple rings + solid core
                    svgContent += `
                        <circle cx="${lastCx.toFixed(1)}" cy="${lastY.toFixed(1)}" r="6" fill="${lastColor}" opacity="0.12">
                            <animate attributeName="r" values="6;18;6" dur="2s" repeatCount="indefinite"/>
                            <animate attributeName="opacity" values="0.25;0;0.25" dur="2s" repeatCount="indefinite"/>
                        </circle>
                        <circle cx="${lastCx.toFixed(1)}" cy="${lastY.toFixed(1)}" r="5" fill="${lastColor}" opacity="0.35">
                            <animate attributeName="r" values="5;12;5" dur="2s" repeatCount="indefinite" begin="0.15s"/>
                            <animate attributeName="opacity" values="0.45;0;0.45" dur="2s" repeatCount="indefinite" begin="0.15s"/>
                        </circle>
                        <circle cx="${lastCx.toFixed(1)}" cy="${lastY.toFixed(1)}" r="4" fill="${lastColor}" opacity="0.6">
                            <animate attributeName="r" values="4;7;4" dur="2s" repeatCount="indefinite" begin="0.3s"/>
                            <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2s" repeatCount="indefinite" begin="0.3s"/>
                        </circle>
                        <circle cx="${lastCx.toFixed(1)}" cy="${lastY.toFixed(1)}" r="4" fill="${lastColor}"/>
                    `;
                } else {
                    // Static dot — market closed
                    svgContent += `<circle cx="${lastCx.toFixed(1)}" cy="${lastY.toFixed(1)}" r="3" fill="${lastColor}"/>`;
                }
            }

            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
            svg.setAttribute('preserveAspectRatio', 'none');
            svg.style.display = 'block';
            svg.style.width = '100%';
            svg.style.height = '100%';
            svg.innerHTML = svgContent;
            container.innerHTML = '';
            container.appendChild(svg);

            // Crosshair + tooltip
            const dataBar = document.getElementById('expandedChartDataBar');

            const renderDataBar = (s) => {
                if (!s || !dataBar) return;
                const oscC = (s.oscillator ?? 0) >= 0 ? '#6ee7b7' : '#f87171';
                const siC  = (s.summationIndex ?? 0) >= 0 ? '#6ee7b7' : '#f87171';
                const netC = (s.net ?? 0) >= 0 ? '#6ee7b7' : '#f87171';
                let html = `<span class="ecdb-date">${s.date ?? ''}</span>`;
                if (chartType === 'hl52') {
                    html += `
                        <span class="ecdb-item"><span class="ecdb-label">Highs</span><span class="ecdb-value" style="color:#6ee7b7;">${s.highs ?? 0}</span></span>
                        <span class="ecdb-item"><span class="ecdb-label">Lows</span><span class="ecdb-value" style="color:#f87171;">${s.lows ?? 0}</span></span>
                        <span class="ecdb-item"><span class="ecdb-label">Net H/L</span><span class="ecdb-value" style="color:${netC};">${(s.net ?? 0) > 0 ? '+' : ''}${s.net ?? 0}</span></span>
                    `;
                } else if (chartType === 'sma5') {
                    const pctC = (s.pct ?? 50) >= 75 ? '#f87171' : (s.pct ?? 50) <= 25 ? '#6ee7b7' : '#a78bfa';
                    const zone = (s.pct ?? 50) >= 75 ? 'Overbought' : (s.pct ?? 50) <= 25 ? 'Oversold' : 'Neutral';
                    const zoneC = (s.pct ?? 50) >= 75 ? '#f87171' : (s.pct ?? 50) <= 25 ? '#6ee7b7' : '#94a3b8';
                    html += `
                        <span class="ecdb-item"><span class="ecdb-label">% Above 5-SMA</span><span class="ecdb-value" style="color:${pctC};">${(s.pct ?? 0).toFixed(1)}%</span></span>
                        <span class="ecdb-item"><span class="ecdb-label">Zone</span><span class="ecdb-value" style="color:${zoneC};">${zone}</span></span>
                    `;
                } else {
                    html += `
                        <span class="ecdb-item"><span class="ecdb-label">Adv</span><span class="ecdb-value" style="color:#6ee7b7;">${s.advances ?? 0}</span></span>
                        <span class="ecdb-item"><span class="ecdb-label">Dec</span><span class="ecdb-value" style="color:#f87171;">${s.declines ?? 0}</span></span>
                        <span class="ecdb-item"><span class="ecdb-label">Net A/D</span><span class="ecdb-value" style="color:${(s.netAD??0)>=0?'#6ee7b7':'#f87171'};">${(s.netAD??0)>0?'+':''}${s.netAD??0}</span></span>
                        <span class="ecdb-item"><span class="ecdb-label">MCO</span><span class="ecdb-value" style="color:${oscC};">${(s.oscillator??0)>0?'+':''}${(s.oscillator??0).toFixed(2)}</span></span>
                        <span class="ecdb-item"><span class="ecdb-label">MCSI</span><span class="ecdb-value" style="color:${siC};">${(s.summationIndex??0)>0?'+':''}${(s.summationIndex??0).toFixed(1)}</span></span>
                        <span class="ecdb-item"><span class="ecdb-label">19d EMA</span><span class="ecdb-value" style="color:#cbd5e1;">${(s.ema19??0).toFixed(2)}</span></span>
                        <span class="ecdb-item"><span class="ecdb-label">39d EMA</span><span class="ecdb-value" style="color:#cbd5e1;">${(s.ema39??0).toFixed(2)}</span></span>
                    `;
                }
                dataBar.innerHTML = html;
            };

            // Seed data bar with the latest data point
            if (series.length > 0) renderDataBar(series[series.length - 1]);

            const handlePointer = (clientX, clientY) => {
                const svgRect = svg.getBoundingClientRect();
                const relX = clientX - svgRect.left;
                // Scale to SVG coordinate space (SVG may be stretched 100% width)
                const scaleX = W / svgRect.width;
                // sma5 uses a narrower plot width (extra right padding for OB/OS labels)
                const activePlotW = (chartType === 'sma5') ? (W - padL - 28) : plotW;
                const idx = Math.round(((relX * scaleX - padL) / activePlotW) * (series.length - 1));
                const clampedIdx = Math.max(0, Math.min(series.length - 1, idx));
                const s = series[clampedIdx];

                svg.querySelectorAll('.crosshair-line').forEach(el => el.remove());

                // Bar charts (hl52, mco) snap to bar center; line charts use proportional x
                let cx;
                if (chartType === 'hl52' || chartType === 'mco') {
                    const barGapCh = 0.5;
                    const barWCh = Math.max(1, (plotW / series.length) - barGapCh);
                    cx = padL + clampedIdx * (barWCh + barGapCh) + barWCh / 2;
                } else {
                    cx = padL + (clampedIdx / (series.length - 1 || 1)) * activePlotW;
                }

                const vLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                vLine.setAttribute('x1', cx); vLine.setAttribute('x2', cx);
                vLine.setAttribute('y1', padT); vLine.setAttribute('y2', H - padB);
                vLine.setAttribute('stroke', '#94a3b8'); vLine.setAttribute('stroke-width', '0.5');
                vLine.setAttribute('stroke-dasharray', '3,2');
                vLine.classList.add('crosshair-line');
                svg.appendChild(vLine);

                renderDataBar(s);
            };

            const hideTooltip = () => {
                svg.querySelectorAll('.crosshair-line').forEach(el => el.remove());
                // Restore latest data point on leave
                if (series.length > 0) renderDataBar(series[series.length - 1]);
            };

            svg.addEventListener('mousemove', (e) => handlePointer(e.clientX, e.clientY));
            svg.addEventListener('mouseleave', hideTooltip);
            svg.addEventListener('touchmove', (e) => { e.preventDefault(); const t = e.touches[0]; handlePointer(t.clientX, t.clientY); }, { passive: false });
            svg.addEventListener('touchstart', (e) => { const t = e.touches[0]; handlePointer(t.clientX, t.clientY); }, { passive: true });
            svg.addEventListener('touchend', () => setTimeout(hideTooltip, 2000));
        },

        // =====================================================================
        // RENDER HELPERS
        // =====================================================================

        // Called after every auto/manual fetch — refreshes any open expanded chart
        // and the McClellan detail modal in-place with fresh data
        _refreshOpenCharts() {
            const expandedModal = document.getElementById('breadthExpandedModal');
            if (expandedModal && this._expandedChartType) {
                const bd = this.data.settings.breadthData;
                // Rebuild the full series with fresh data for the correct chart type
                if (this._expandedChartType === 'hl52') {
                    this._expandedChartFullSeries = this._getHlHistory(bd);
                } else if (this._expandedChartType === 'sma5') {
                    // Defensive reload then merge live value
                    if (!bd.pctAbove5smaHistory || bd.pctAbove5smaHistory.length === 0) {
                        bd.pctAbove5smaHistory = this._loadSma5History();
                    }
                    let sma5Series = (bd?.pctAbove5smaHistory || []).slice();
                    const _todayExpSma5 = new Date().toLocaleDateString('en-CA', { timeZone: 'America/New_York' });
                    const _fetchedTodayExpSma5 = bd?.lastBreadthFetch ? new Date(bd.lastBreadthFetch).toLocaleDateString('en-CA', { timeZone: 'America/New_York' }) === _todayExpSma5 : false;
                    if ((this._isMarketOpenCached() || this._isTradingDaySessionDone()) && _fetchedTodayExpSma5 && bd?.pctAbove5sma !== null && bd?.pctAbove5sma !== undefined) {
                        const last = sma5Series[sma5Series.length - 1];
                        if (!last || last.date !== _todayExpSma5) sma5Series = [...sma5Series, { date: _todayExpSma5, pct: bd.pctAbove5sma }];
                        else sma5Series[sma5Series.length - 1] = { ...last, pct: bd.pctAbove5sma };
                    }
                    this._expandedChartFullSeries = sma5Series;
                } else {
                    this._expandedChartFullSeries = this._buildMcClellanSeries();
                }

                // Re-render just the chart area and zoom subtitle, leaving the modal shell intact
                const area = document.getElementById('expandedChartArea');
                if (area) area.innerHTML = '';
                this._renderExpandedZoom();
                requestAnimationFrame(() => {
                    this._renderExpandedChart(this._expandedChartType, this._getZoomedSeries());
                });

                // Update the header value badge with latest data
                const series = this._expandedChartFullSeries;
                if (series.length) {
                    const latest = series[series.length - 1];
                    const valEl = expandedModal.querySelector('.chart-val-text');
                    if (valEl) {
                        let val, valStr, valColor;
                        if (this._expandedChartType === 'hl52') {
                            val = latest.net ?? 0;
                            valStr = `${val > 0 ? '+' : ''}${val}`;
                            valColor = val >= 0 ? '#6ee7b7' : '#f87171';
                        } else if (this._expandedChartType === 'sma5') {
                            val = latest.pct ?? 0;
                            valStr = `${val.toFixed(1)}%`;
                            valColor = val >= 75 ? '#f87171' : val <= 25 ? '#6ee7b7' : '#a78bfa';
                        } else if (this._expandedChartType === 'mco') {
                            const mcDisp = this._getMcDisplay();
                            val = mcDisp.osc;
                            valStr = mcDisp.oscStr;
                            valColor = val >= 0 ? '#6ee7b7' : '#f87171';
                        } else {
                            const mcDisp = this._getMcDisplay();
                            val = mcDisp.si;
                            valStr = mcDisp.siStr;
                            valColor = val >= 0 ? '#6ee7b7' : '#f87171';
                        }
                        valEl.style.color = valColor;
                        valEl.textContent = valStr;
                    }
                }
                return; // expanded modal handled — no need to also refresh detail modal
            }

            // If the McClellan detail modal is open, rebuild it in-place
            const detailModal = document.getElementById('trendMapModal');
            if (detailModal) {
                this._openMcClellanDetail();
            }
        },

        _detailOpen: false,
        _toggleDetail() {
            this._detailOpen = !this._detailOpen;
            const d = document.getElementById('detailPanel'), i = document.getElementById('detailIcon');
            if (d) { d.classList.toggle('hidden'); if (i) i.style.transform = this._detailOpen ? 'rotate(180deg)' : ''; }
        }
    };

    // Boot
    document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
