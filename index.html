    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            /* Lock to viewport — no bounce scroll on iOS */
            height: 100%;
            overflow: hidden;
        }

        /* ── Main scroll container ── */
        #appRoot {
            height: 100dvh;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            /* Respect notches/home bar */
            padding-top: env(safe-area-inset-top, 0px);
            padding-bottom: env(safe-area-inset-bottom, 0px);
            padding-left: env(safe-area-inset-left, 0px);
            padding-right: env(safe-area-inset-right, 0px);
        }

        /* When main panel fits on screen we don't want scroll at all */
        #appRoot.no-scroll { overflow: hidden; }

        .tm-banner { position: relative; overflow: hidden; }
        .tm-banner::before { content: ''; position: absolute; inset: 0; opacity: 0.12; background: linear-gradient(135deg, transparent 20%, rgba(255,255,255,0.4) 40%, rgba(255,255,255,0.1) 45%, transparent 65%); pointer-events: none; }
        .tm-banner::after { content: ''; position: absolute; inset: 0; opacity: 0.06; background: radial-gradient(ellipse at 30% 0%, rgba(255,255,255,0.8) 0%, transparent 60%); pointer-events: none; }
        .tm-orb { position: relative; border-radius: 50%; }
        .tm-orb::before { content: ''; position: absolute; top: 15%; left: 20%; width: 35%; height: 30%; border-radius: 50%; background: rgba(255,255,255,0.45); filter: blur(1px); }
        @keyframes tm-shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .tm-shimmer { background-size: 200% 100%; animation: tm-shimmer 3s ease-in-out infinite; }
        @keyframes live-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.35; transform: scale(0.65); } }
        .live-dot { animation: live-pulse 2s ease-in-out infinite; }
        .hidden { display: none !important; }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        input[type="text"], input[type="password"], input[type="number"] { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; border-radius: 6px; padding: 6px 10px; font-size: 13px; outline: none; }
        input:focus { border-color: #3b82f6; }
        .config-section { background: rgba(30,41,59,0.5); border: 1px solid #1e293b; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        /* Hardcoded API keys — no key entry UI needed */

        /* ── Expanded chart modal ── */
        #breadthExpandedModal {
            position: fixed;
            inset: 0;
            z-index: 110;
            background: rgba(2, 6, 23, 0.97);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            /* safe areas so nothing clips behind notch/home indicator */
            padding-top: env(safe-area-inset-top, 0px);
            padding-bottom: env(safe-area-inset-bottom, 0px);
            padding-left: env(safe-area-inset-left, 0px);
            padding-right: env(safe-area-inset-right, 0px);
        }

        /* Header row stays at natural height */
        #expandedChartHeader {
            flex: 0 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            border-bottom: 1px solid #1e293b;
            min-height: 52px;
        }

        /* Zoom bar */
        #expandedChartZoom {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-bottom: 1px solid rgba(30,41,59,0.5);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        #expandedChartZoom::-webkit-scrollbar { display: none; }

        /* Chart fills remaining space — key to landscape responsiveness */
        #expandedChartArea {
            flex: 1 1 0;
            position: relative;
            overflow: hidden;
            min-height: 0; /* critical flex fix */
        }

        /* Floating tooltip — kept in DOM but never shown */
        #expandedChartTooltip { display: none; }

        /* Inline data bar shown beneath zoom buttons, above chart */
        #expandedChartDataBar {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            gap: 0;
            padding: 5px 16px;
            border-bottom: 1px solid rgba(30,41,59,0.6);
            font-family: monospace;
            font-size: 10px;
            min-height: 28px;
            background: rgba(15,23,42,0.4);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            white-space: nowrap;
        }
        #expandedChartDataBar::-webkit-scrollbar { display: none; }
        .ecdb-item {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 0 10px;
            border-right: 1px solid #1e293b;
        }
        .ecdb-item:first-child { padding-left: 0; }
        .ecdb-item:last-child { border-right: none; }
        .ecdb-label { color: #475569; font-size: 9px; text-transform: uppercase; letter-spacing: 0.04em; }
        .ecdb-value { font-weight: 700; font-size: 10px; }
        .ecdb-date { color: #64748b; font-size: 9px; margin-right: 6px; }

        /* Landscape-specific compact header */
        @media (orientation: landscape) and (max-height: 500px) {
            #expandedChartHeader {
                min-height: 40px;
                padding: 6px 12px;
            }
            #expandedChartHeader .chart-title-text { font-size: 11px; }
            #expandedChartHeader .chart-val-text { font-size: 14px; }
            #expandedChartZoom {
                padding: 4px 12px;
            }
            #expandedChartZoom button {
                padding: 3px 10px;
                font-size: 9px;
            }
        }

        /* Animate-spin polyfill for Lucide loader */
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
    </style>
</head>

    <script>
    // =========================================================================
    // STANDALONE TREND M.A.P. APPLICATION
    // =========================================================================
    const app = {
        // --- PERSISTENT STATE ---
        data: { settings: {} },

        // --- AUTO-POLL STATE ---
        _pollInterval: null,        // setInterval handle
        _POLL_SECONDS: 60,          // interval length
        _clockCache: null,          // { isOpen, nextOpen, nextClose, fetchedAt }
        _CLOCK_TTL_MS: 30000,       // re-fetch clock at most every 30s
        _tradingDaysCache: null,    // { count, fetchedAt }
        _CALENDAR_TTL_MS: 3600000, // re-fetch calendar at most once per hour

        async init() {
            // Load from localStorage
            try {
                const saved = localStorage.getItem('trendmap_data');
                if (saved) this.data = JSON.parse(saved);
            } catch(e) { console.warn('Failed to load saved data:', e); }

            if (!this.data.settings) this.data.settings = {};

            this.initTrendMap();
            this.initBreadth();

            // Render immediately with whatever state we have (may be grey)
            this.renderTrendMap();
            lucide.createIcons();

            // Fetch calendar immediately so trading days shows on first paint,
            // regardless of market hours — then re-render once the count arrives
            this._fetchTradingDaysRemaining().then(() => {
                this.renderTrendMap();
                lucide.createIcons();
            });

            // Always fetch the baseline on startup — it's a static JSON file and
            // requires no API keys. Once loaded, recompute McClellan signals and
            // re-render so the detail view has the full history on first open.
            await this._loadBaselineOnStartup();

            // Start auto-polling (market hours only, 60-second cadence)
            this._startAutoPoll();
        },

        async _loadBaselineOnStartup() {
            const bd = this.data.settings.breadthData;
            if (!bd) return;

            // Skip if already loaded in this session (e.g. user already clicked Refresh)
            if (bd.baselineLoaded && bd.baseline) return;

            try {
                const baseline = await this._fetchBaseline();
                if (!baseline) return;

                bd.baseline = baseline;
                bd.baselineLoaded = true;

                // Seed adHistory from the baseline's recent history so incremental
                // McClellan calculation has the correct starting EMA state
                if (baseline.adHistory && baseline.adHistory.length) {
                    // Merge: use >= so today's live A/D overrides the baseline's
                    // end-of-day snapshot rather than being excluded
                    const baselineEnd = baseline.lastState?.date || '';
                    const liveNewer = (bd.adHistory || []).filter(d => d.date >= baselineEnd);
                    bd.adHistory = [...baseline.adHistory.filter(d => d.date < baselineEnd), ...liveNewer];
                }

                // Seed H/L history if the baseline provides it (version 3+)
                if (baseline.hlHistory && baseline.hlHistory.length) {
                    // Preserve any live today entry, same pattern as adHistory
                    const baselineHlEnd = baseline.hlHistory[baseline.hlHistory.length - 1]?.date || '';
                    const liveHlNewer = (bd.netHighLowHistory || []).filter(d => d.date > baselineHlEnd);
                    bd.netHighLowHistory = [...baseline.hlHistory, ...liveHlNewer];
                }

                // Recompute McClellan from the now-loaded baseline
                this._computeMcClellan();
                this._computeNetHighLowSignal();

                // Check for stale baseline and surface warning if needed
                this._checkBaselineStaleness(baseline);

                // Re-render so charts and signal values reflect the full history
                this.renderTrendMap();
                lucide.createIcons();
            } catch (e) {
                console.warn('Startup baseline load failed:', e);
            }
        },

        // =====================================================================
        // BASELINE STALENESS DETECTION
        // =====================================================================

        _checkBaselineStaleness(baseline) {
            if (!baseline || !baseline.generated) return;
            const generatedMs = new Date(baseline.generated).getTime();
            if (isNaN(generatedMs)) return;
            const ageHours = (Date.now() - generatedMs) / (1000 * 60 * 60);
            // Warn if baseline is older than 36 hours
            if (ageHours > 36) {
                this._baselineStale = true;
                this._baselineAgeHours = Math.round(ageHours);
                console.warn(`Baseline is stale: ${this._baselineAgeHours}h old (generated ${baseline.generated})`);
            } else {
                this._baselineStale = false;
                this._baselineAgeHours = null;
            }
        },

        _getStalenessWarningHtml() {
            if (!this._baselineStale) return '';
            const h = this._baselineAgeHours || '?';
            const actionsUrl = 'https://github.com/dmgalanis/MarketDashboard/actions';
            return `<div style="background:rgba(251,191,36,0.10);border:1px solid rgba(251,191,36,0.35);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:10px;">
                <span style="font-size:14px;">&#x26A0;&#xFE0F;</span>
                <div style="flex:1;min-width:0;">
                    <div style="font-size:9px;font-weight:700;color:#fbbf24;text-transform:uppercase;letter-spacing:0.06em;">Baseline Data Stale (${h}h old)</div>
                    <div style="font-size:8px;color:#94a3b8;margin-top:2px;">McClellan charts may be missing recent days. Heals automatically tonight at 00:30 UTC.</div>
                </div>
                <a href="${actionsUrl}" target="_blank" rel="noopener" style="flex-shrink:0;font-size:8px;color:#fbbf24;text-decoration:underline;white-space:nowrap;">Re-run&nbsp;&rarr;</a>
            </div>`;
        },

        // =====================================================================
        // AUTO-POLL ENGINE  —  uses Alpaca /v2/clock for holiday-aware gating
        // =====================================================================

        // Fetch market open status from Alpaca clock endpoint.
        // Results are cached for _CLOCK_TTL_MS to avoid hammering the API.
        async _fetchMarketClock() {
            const now = Date.now();
            if (this._clockCache && (now - this._clockCache.fetchedAt) < this._CLOCK_TTL_MS) {
                return this._clockCache;
            }
            try {
                const ak = 'PKUUSHFDNCOL7TAO3INP6BO4VJ';
                const as = '3kqytxkfDqxRuAmQjGdzeYYTGCT5jdF9GLtKqwNbNBxW';
                const res = await fetch('https://paper-api.alpaca.markets/v2/clock', {
                    headers: {
                        'APCA-API-KEY-ID': ak,
                        'APCA-API-SECRET-KEY': as,
                        'Accept': 'application/json'
                    }
                });
                if (!res.ok) throw new Error(`Clock API ${res.status}`);
                const data = await res.json();
                this._clockCache = {
                    isOpen: data.is_open,
                    nextOpen: data.next_open,
                    nextClose: data.next_close,
                    fetchedAt: now
                };
                return this._clockCache;
            } catch (e) {
                console.warn('Alpaca clock fetch failed, falling back to local check:', e);
                // Fallback: basic weekday + ET hours check (no holiday awareness)
                const etStr = new Date().toLocaleString('en-US', { timeZone: 'America/New_York' });
                const et = new Date(etStr);
                const day = et.getDay();
                const mins = et.getHours() * 60 + et.getMinutes();
                const isOpen = day >= 1 && day <= 5 && mins >= 570 && mins < 960;
                return { isOpen, nextOpen: null, nextClose: null, fetchedAt: now };
            }
        },

        // Synchronous best-guess used only for rendering the dot colour on re-render
        // (uses cached clock result so no async needed in template strings)
        _isMarketOpenCached() {
            return this._clockCache ? this._clockCache.isOpen : false;
        },

        _startAutoPoll() {
            this._stopAutoPoll();

            // Immediate clock + calendar check on startup
            (async () => {
                const [clock] = await Promise.all([
                    this._fetchMarketClock(),
                    this._fetchTradingDaysRemaining()
                ]);
                this._updateDot(clock.isOpen);
                this.renderTrendMap(); // re-render now that calendar count is ready
                if (clock.isOpen) {
                    setTimeout(() => this.fetchTrendMapData(), 1500);
                }
            })();

            // Recurring 60-second poll
            this._pollInterval = setInterval(async () => {
                const [clock] = await Promise.all([
                    this._fetchMarketClock(),
                    this._fetchTradingDaysRemaining()
                ]);
                this._updateDot(clock.isOpen);
                if (clock.isOpen) {
                    await this.fetchTrendMapData(true);
                } else {
                    // Outside market hours: still re-render to keep trading days count fresh
                    this.renderTrendMap();
                }
            }, this._POLL_SECONDS * 1000);
        },

        _stopAutoPoll() {
            if (this._pollInterval) { clearInterval(this._pollInterval); this._pollInterval = null; }
        },

        // Update just the dot colour without a full re-render
        _updateDot(isOpen) {
            const dot = document.getElementById('autoPollDot');
            if (!dot) return;
            dot.style.background = isOpen ? '#34d399' : '#475569';
            if (isOpen) dot.classList.add('live-dot');
            else dot.classList.remove('live-dot');
            const pill = dot.closest('[title]');
            if (pill) pill.title = isOpen ? 'Auto-refreshing every 60s' : 'Market closed — auto-refresh paused';
            // If the expanded chart is open and the market just closed, re-render
            // the chart so the pulsing live dot is replaced with a static dot.
            if (!isOpen && document.getElementById('breadthExpandedModal')) {
                const container = document.getElementById('expandedChartArea');
                if (container) requestAnimationFrame(() => this._renderExpandedChart(this._expandedChartType, this._getZoomedSeries()));
            }
        },

        save() {
            try {
                const bd = this.data.settings.breadthData;
                // Serialise — exclude large/rebuildable fields from main key
                let payload = this.data;
                if (bd) {
                    const bdSave = Object.assign({}, bd, {
                        baseline: null,
                        stMomentumHistory: undefined,
                        pctAbove5smaHistory: [] // stored separately — see trendmap_sma5history
                    });
                    payload = Object.assign({}, this.data, {
                        settings: Object.assign({}, this.data.settings, { breadthData: bdSave })
                    });
                }
                localStorage.setItem('trendmap_data', JSON.stringify(payload));
                // Store history arrays in isolated keys — never touched by main save
                if (bd && bd.pctAbove5smaHistory && bd.pctAbove5smaHistory.length > 0) {
                    localStorage.setItem('trendmap_sma5history', JSON.stringify(bd.pctAbove5smaHistory));
                }
                if (bd && bd.stMomentumHistory && bd.stMomentumHistory.length > 0) {
                    localStorage.setItem('trendmap_stmomentum', JSON.stringify(bd.stMomentumHistory));
                }
            } catch(e) { console.warn('Save failed:', e); }
        },

        _loadSma5History() {
            try {
                const raw = localStorage.getItem('trendmap_sma5history');
                return raw ? JSON.parse(raw) : [];
            } catch(e) { return []; }
        },

        _loadStMomentumHistory() {
            try {
                const raw = localStorage.getItem('trendmap_stmomentum');
                return raw ? JSON.parse(raw) : [];
            } catch(e) { return []; }

            if (tm.overrides[key] !== null && tm.overrides[key] !== undefined) return tm.overrides[key];

            const allGroupNo  = group.every(s => s === 'NO');
            const anyGroupYes = group.some(s => s === 'YES');
            const anyGroupNo  = group.some(s => s === 'NO');

            if (mcsi === 'YES' && allGroupYes)  return { colour: 'GREEN',  action: 'FULL EXPOSURE ALLOWED' };

        // =====================================================================
        // QQQE DATA FETCH (Alpaca)
        // =====================================================================
        async fetchTrendMapData(quickPoll = false) {
            const tm = this.data.settings.trendMap;

            // Reset all manual overrides back to auto on refresh
            if (!quickPoll && tm.overrides) {
                Object.keys(tm.overrides).forEach(k => { tm.overrides[k] = null; });
            }

            // Animate the live dot while fetching
            const dot = document.getElementById('autoPollDot');
            if (dot) { dot.style.background = '#60a5fa'; dot.classList.add('live-dot'); }

            // Quick polls only update breadth — QQQE signals are daily and don't need re-fetching every 60s
            if (quickPoll) {
                try {
                    await this.fetchBreadthData(true);
                    this.renderTrendMap();
                    this._refreshOpenCharts();
                } catch (err) {
                    console.warn('Quick poll breadth error:', err);
                } finally {
                    this.renderTrendMap();
                }
                return;
            }

            try {
                const ak = 'PKUUSHFDNCOL7TAO3INP6BO4VJ';
                const as = '3kqytxkfDqxRuAmQjGdzeYYTGCT5jdF9GLtKqwNbNBxW';

                const symbol = 'QQQE';
                const end = new Date(), start = new Date(); start.setMonth(start.getMonth() - 7);
                const startStr = start.toISOString().split('T')[0], endStr = end.toISOString().split('T')[0];
                let dailyData = [];

                // Fetch daily bars
                try {
                    let url = `https://data.alpaca.markets/v2/stocks/${symbol}/bars?timeframe=1Day&start=${startStr}&end=${endStr}&limit=200&adjustment=split&sort=asc`;
                    const h = { 'APCA-API-KEY-ID': ak, 'APCA-API-SECRET-KEY': as, 'Accept': 'application/json' };
                    let res = await fetch(url, { headers: h });
                    if (res.status === 403) res = await fetch(`${url}&feed=iex`, { headers: h });
                    if (res.ok) { const d = await res.json(); if (d.bars?.length) dailyData = d.bars.map(b => ({ date: new Date(b.t), close: b.c })); }
                } catch (e) { console.warn('Alpaca bars failed:', e); }

                if (dailyData.length < 30) throw new Error('Insufficient QQQE data');

                const sma = (data, p) => { const r = []; for (let i = 0; i < data.length; i++) { if (i < p-1) r.push(null); else { let s = 0; for (let j = i-p+1; j <= i; j++) s += data[j].close; r.push(s/p); } } return r; };

                const sma5 = sma(dailyData, 5), sma10 = sma(dailyData, 10), sma20 = sma(dailyData, 20);
                const li = dailyData.length - 1, lc = dailyData[li].close;
                const ls5 = sma5[li], ps5 = sma5[li-1], ls10 = sma10[li], ls20 = sma20[li];

                tm.signals.p1_above_rising_5sma = (lc > ls5) && (ls5 > ps5);
                tm.signals.p2_daily_buy_signal = (lc > ls10) && (lc > ls20) && (ls10 > ls20);

                // Weekly
                const wd = []; let wb = [], cw = -1;
                dailyData.forEach(d => {
                    const wn = this._getISOWeek(d.date), yw = d.date.getFullYear() * 100 + wn;
                    if (yw !== cw && wb.length) { wd.push(wb[wb.length-1]); wb = []; }
                    cw = yw; wb.push(d);
                });
                if (wb.length) wd.push(wb[wb.length-1]);

                if (wd.length >= 20) {
                    const w10 = sma(wd, 10), w20 = sma(wd, 20), wi = wd.length - 1;
                    tm.signals.p3_weekly_buy_signal = (wd[wi].close > w10[wi]) && (wd[wi].close > w20[wi]) && (w10[wi] > w20[wi]);
                }

                tm.priceCache = { lastClose: lc, sma5: ls5, sma10: ls10, sma20: ls20, sma5Rising: ls5 > ps5 };
                tm.lastFetch = new Date().toISOString();
                this.save();

                // Also fetch breadth data — full fetch on manual refresh
                await this.fetchBreadthData(quickPoll);

                this.renderTrendMap();
                this._refreshOpenCharts();

            } catch (err) {
                console.warn('Trend MAP error:', err);
                // Flash dot red briefly on error
                const dotEl = document.getElementById('autoPollDot');
                if (dotEl) { dotEl.style.background = '#f87171'; setTimeout(() => this.renderTrendMap(), 3000); }
                else { setTimeout(() => this.renderTrendMap(), 3000); }
            }
        },

        _getISOWeek(date) {
            const d = new Date(date); d.setHours(0,0,0,0);
            d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
            const w1 = new Date(d.getFullYear(), 0, 4);
            return 1 + Math.round(((d - w1) / 86400000 - 3 + (w1.getDay() + 6) % 7) / 7);
        },

        // =====================================================================
        // TRADING DAYS REMAINING
        // =====================================================================
        // Fetch remaining trading days from Alpaca calendar — holiday & early-close aware.
        // Result cached for one hour; today's partial day is excluded (floor, no half-days).
        async _fetchTradingDaysRemaining() {
            const now = Date.now();
            if (this._tradingDaysCache && (now - this._tradingDaysCache.fetchedAt) < this._CALENDAR_TTL_MS) {
                return this._tradingDaysCache.count;
            }
            try {
                const ak = 'PKUUSHFDNCOL7TAO3INP6BO4VJ';
                const as = '3kqytxkfDqxRuAmQjGdzeYYTGCT5jdF9GLtKqwNbNBxW';

                // Start from tomorrow so today is never counted as a remaining day,
                // regardless of whether it's a half-day or full day.
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                const startStr = tomorrow.toISOString().split('T')[0];

                const year = new Date().getFullYear();
                const endStr = `${year}-12-31`;

                const res = await fetch(
                    `https://paper-api.alpaca.markets/v2/calendar?start=${startStr}&end=${endStr}`,
                    {
                        headers: {
                            'APCA-API-KEY-ID': ak,
                            'APCA-API-SECRET-KEY': as,
                            'Accept': 'application/json'
                        }
                    }
                );
                if (!res.ok) throw new Error(`Calendar API ${res.status}`);
                const days = await res.json();
                // Each entry is one actual trading session — count is the answer.
                // Math.floor is applied as a safeguard; the count will always be whole.
                const count = Math.floor(Array.isArray(days) ? days.length : 0);
                this._tradingDaysCache = { count, fetchedAt: now };
                return count;
            } catch (e) {
                console.warn('Alpaca calendar fetch failed, using cached value:', e);
                // Return cached value if available, else null (renders as '—')
                return this._tradingDaysCache ? this._tradingDaysCache.count : null;
            }
        },

        _getTradingDaysRemaining() {
            return this._tradingDaysCache ? this._tradingDaysCache.count : '—';
        },

            'MDB','MDLZ','MELI','META','MNST','MRVL','MSFT','MU','NFLX','NVDA',
            'NXPI','ODFL','ON','ORLY','PCAR','PAYX','PANW','PDD','PEP','PLTR',
            'PYPL','QCOM','REGN','ROP','ROST','SBUX','SHOP','SMCI','SNPS','SPX',
            'TEAM','TMUS','TRI','TSLA','TTD','TTWO','TXN','VRSK','VRTX','WBD','XEL'
        ],

        _breadthDefaults() {
            return {
                snapshots: {}, advancers: 0, decliners: 0,
                newHighs: 0, newLows: 0, netHighLow: 0,
                netHighLowHistory: [], adHistory: [], pctAbove5smaHistory: [],
                mcclellan: {
                    oscillator: null, summationIndex: null, prevSummationIndex: null,
                    ema19: null, ema39: null,
                    overboughtThreshold: 7, oversoldThreshold: -7,
                    isOverbought: false, mcsiUptrend: false
                },
                baseline: null, baselineLoaded: false,
                lastBreadthFetch: null, componentCount: 0
            };
        },

        initBreadth() {
            if (!this.data.settings.breadthData) {
                this.data.settings.breadthData = this._breadthDefaults();
            }
            const bd = this.data.settings.breadthData;
            if (!bd.netHighLowHistory) bd.netHighLowHistory = [];
            if (!bd.adHistory) bd.adHistory = [];
            // Load sma5 history from its own isolated localStorage key
            if (!bd.pctAbove5smaHistory || bd.pctAbove5smaHistory.length === 0) {
                bd.pctAbove5smaHistory = this._loadSma5History();
            }
            // Load stMomentumHistory from its own isolated localStorage key
            if (!bd.stMomentumHistory || bd.stMomentumHistory.length === 0) {
                bd.stMomentumHistory = this._loadStMomentumHistory();
            }
            if (!bd.snapshots) bd.snapshots = {};
            if (!bd.mcclellan) bd.mcclellan = this._breadthDefaults().mcclellan;
        },

        async _fetchBaseline() {
            try {
                const res = await fetch(`breadth_baseline.json?v=${Date.now()}`);
                if (!res.ok) return null;
                const data = await res.json();
                if (data.version && data.lastState && data.dailySeries) {
                    console.log(`Breadth: Baseline loaded — ${data.tradingDays} days, last: ${data.lastState.date}`);
                    return data;
                }
                return null;
            } catch (e) { console.warn('Baseline fetch error:', e); return null; }
        },

        async fetchBreadthData(quickPoll = false) {
            const ak = 'PKUUSHFDNCOL7TAO3INP6BO4VJ';
            const as = '3kqytxkfDqxRuAmQjGdzeYYTGCT5jdF9GLtKqwNbNBxW';

            this.initBreadth();
            const bd = this.data.settings.breadthData;
            const headers = { 'APCA-API-KEY-ID': ak, 'APCA-API-SECRET-KEY': as, 'Accept': 'application/json' };

            // Step 1: Load baseline (skip on quick poll — baseline doesn't change intraday)
            if (!quickPoll) {
                const freshBaseline = await this._fetchBaseline();
                if (freshBaseline) {
                    bd.baseline = freshBaseline;
                    bd.baselineLoaded = true;
                    const baselineEnd = freshBaseline.lastState?.date || '';
                    const liveNewer = (bd.adHistory || []).filter(d => d.date >= baselineEnd);
                    bd.adHistory = [...(freshBaseline.adHistory || []).filter(d => d.date < baselineEnd), ...liveNewer];
                    if (freshBaseline.hlHistory && freshBaseline.hlHistory.length) {
                        // Preserve any live today entry already in netHighLowHistory,
                        // same pattern as adHistory — baseline is end-of-yesterday, so
                        // today's intraday entry (if present) must survive the reseed.
                        const baselineHlEnd = freshBaseline.hlHistory[freshBaseline.hlHistory.length - 1]?.date || '';
                        const liveHlNewer = (bd.netHighLowHistory || []).filter(d => d.date > baselineHlEnd);
                        bd.netHighLowHistory = [...freshBaseline.hlHistory, ...liveHlNewer];
                    }
                }
            }

            const components = (bd.baseline?.components?.length >= 80) ? bd.baseline.components : this._QQQE_COMPONENTS;

            // Step 2: Batch snapshot fetch
            const batchSize = 50;
            const allSnapshots = {};
            for (let i = 0; i < components.length; i += batchSize) {
                const batch = components.slice(i, i + batchSize);
                try {
                    let url = `https://data.alpaca.markets/v2/stocks/snapshots?symbols=${batch.join(',')}`;
                    let res = await fetch(url, { headers });
                    if (res.status === 403) res = await fetch(`${url}&feed=iex`, { headers });
                    if (res.ok) Object.assign(allSnapshots, await res.json());
                } catch (e) { console.warn(`Snapshot batch ${i} failed:`, e); }
            }

            // Step 3: Process snapshots
            let advancers = 0, decliners = 0, processed = 0;
            const snapData = {};
            components.forEach(sym => {
                const snap = allSnapshots[sym];
                if (!snap) return;
                const price = snap.dailyBar?.c || 0;  // Regular-session close only — latestTrade can be an after-hours print and would skew A/D counts
                const prevClose = snap.prevDailyBar?.c || 0;
                if (price <= 0 || prevClose <= 0) return;
                if (price > prevClose) advancers++;
                else if (price < prevClose) decliners++;
                snapData[sym] = {
                    price, prevClose,
                    dailyHigh: snap.dailyBar?.h || price,
                    dailyLow: snap.dailyBar?.l || price,
                    advancing: price > prevClose
                };
                processed++;
            });

            // Step 4: 52-week high/low + historical % above 5 SMA
            // Run _fetch52WeekData on full refreshes, OR on the first quick poll of the day
            // if per-symbol 52w data hasn't been fetched yet today. Once fetched, the stored
            // priorHigh52w/priorLow52w values are stable all day — only dailyHigh changes (from snapshots).
            const todayDateStr = new Date().toISOString().split('T')[0];
            const need52w = !quickPoll || (() => {
                const stored = bd.snapshots || {};
                const firstSym = components.find(s => stored[s]);
                if (!firstSym || stored[firstSym].priorHigh52w == null) return true; // never fetched
                return bd.last52wFetchDate !== todayDateStr; // not yet fetched today
            })();
            const stored0 = bd.snapshots || {};
            const sym0 = Object.keys(stored0)[0];
            if (need52w) {
                // Full bar fetch — builds 52w H/L data AND full year of % above 5 SMA history
                // Also builds stMomentumHistory (60-day gt4 counts) for GDB normalization
                const fetchResult = await this._fetch52WeekData(headers, components, snapData);
                if (fetchResult) {
                    bd.last52wFetchDate = todayDateStr;
                    if (fetchResult.builtHistory && fetchResult.builtHistory.length > 0) {
                        bd.pctAbove5smaHistory = fetchResult.builtHistory;
                        // Immediately persist to isolated key so it survives future save() cycles
                        try { localStorage.setItem('trendmap_sma5history', JSON.stringify(fetchResult.builtHistory)); } catch(e) {}
                    }
                    if (fetchResult.stMomentumHistory && fetchResult.stMomentumHistory.length > 0) {
                        bd.stMomentumHistory = fetchResult.stMomentumHistory;
                        try { localStorage.setItem('trendmap_stmomentum', JSON.stringify(fetchResult.stMomentumHistory)); } catch(e) {}
                    }
                }
            } else {
                // Quick poll: use the per-stock aboveSma5 flag stored from the last full bar fetch.
                // This is accurate (computed against real 5-day SMA) and only becomes stale when
                // a stock crosses its SMA intraday — acceptable for a 60s poll cadence.
                let above5Count = 0, sma5Eligible = 0;
                // Also compute live gt4 counts from snapshots for GDB
                let liveUpGt4 = 0, liveDnGt4 = 0;
                const stored = bd.snapshots || {};
                components.forEach(sym => {
                    const s = snapData[sym];
                    if (!s) return;
                    if (s.price > 0 && s.prevClose > 0) {
                        // Use stored aboveSma5 from last full fetch if available
                        const storedSnap = stored[sym];
                        if (storedSnap && storedSnap.sma5 !== undefined) {
                            sma5Eligible++;
                            if (s.price > storedSnap.sma5) above5Count++;
                        } else if (storedSnap && storedSnap.aboveSma5 !== undefined) {
                            sma5Eligible++;
                            if (storedSnap.aboveSma5) above5Count++;
                        }
                        // GT4 counts from live changePct
                        const chg = (s.price - s.prevClose) / s.prevClose * 100;
                        if (chg > 4)  liveUpGt4++;
                        if (chg < -4) liveDnGt4++;
                    }
                });
                bd.pctAbove5sma = sma5Eligible > 0 ? parseFloat(((above5Count / sma5Eligible) * 100).toFixed(1)) : null;
                // Store live gt4 counts so GDB can use them every 60s
                bd.liveUpGt4 = liveUpGt4;
                bd.liveDnGt4 = liveDnGt4;
            }

            // Step 5: Calculate Net 52-Week H/L
            // On quick polls where _fetch52WeekData didn't run, merge stored 52w ranges into snapData.
            // When need52w=true, _fetch52WeekData already populated snapData directly — skip the merge.
            if (quickPoll && !need52w) {
                const stored = bd.snapshots || {};
                components.forEach(sym => {
                    if (snapData[sym] && stored[sym]) {
                        snapData[sym].priorHigh52w = stored[sym].priorHigh52w;
                        snapData[sym].priorLow52w = stored[sym].priorLow52w;
                        snapData[sym].high52w = stored[sym].high52w;
                        snapData[sym].low52w = stored[sym].low52w;
                        snapData[sym].aboveSma5 = stored[sym].aboveSma5;
                        snapData[sym].sma5 = stored[sym].sma5;
                    }
                });
            }
            let newHighs = 0, newLows = 0;
            components.forEach(sym => {
                const s = snapData[sym];
                if (!s || s.price <= 0) return; // skip stub entries with no real snapshot data
                s.changePct = s.prevClose > 0 ? ((s.price - s.prevClose) / s.prevClose * 100) : 0;
                s.distFromHigh = (s.high52w && s.high52w > 0) ? ((s.high52w - s.price) / s.high52w) : 1;
                s.distFromLow = (s.low52w && s.low52w > 0) ? ((s.price - s.low52w) / s.low52w) : 1;
                s.isNew52wHigh = (s.priorHigh52w !== null && s.priorHigh52w !== undefined && s.dailyHigh > 0 && s.dailyHigh >= s.priorHigh52w);
                s.isNew52wLow = (s.priorLow52w !== null && s.priorLow52w !== undefined && s.dailyLow > 0 && s.dailyLow <= s.priorLow52w);
                if (s.isNew52wHigh) newHighs++;
                if (s.isNew52wLow) newLows++;
            });

            const netHighLow = newHighs - newLows;
            // Log a sample symbol to show what values were used
            bd.snapshots = snapData;
            bd.advancers = advancers;
            bd.decliners = decliners;
            bd.newHighs = newHighs;
            bd.newLows = newLows;
            bd.netHighLow = netHighLow;
            bd.componentCount = processed;
            bd.lastBreadthFetch = new Date().toISOString();

            // On full fetch (or when _fetch52WeekData ran on a quick poll), derive pctAbove5sma from accurate aboveSma5 flags
            if (!quickPoll || need52w) {
                let above5Count = 0, sma5Eligible = 0;
                components.forEach(sym => {
                    const s = snapData[sym];
                    if (!s || s.aboveSma5 === undefined) return;
                    sma5Eligible++;
                    if (s.aboveSma5) above5Count++;
                });
                if (sma5Eligible > 0) bd.pctAbove5sma = parseFloat(((above5Count / sma5Eligible) * 100).toFixed(1));
            }

            const now = new Date();
            const isWeekend = now.getDay() === 0 || now.getDay() === 6;
            const today = now.toISOString().split('T')[0];

            // Purge weekend entries
            const purge = (arr) => {
                for (let i = arr.length - 1; i >= 0; i--) {
                    const d = new Date(arr[i].date + 'T12:00:00Z');
                    if (d.getUTCDay() === 0 || d.getUTCDay() === 6) arr.splice(i, 1);
                }
            };
            purge(bd.adHistory);
            purge(bd.netHighLowHistory);

            // Only write to history during regular market hours — after-hours snapshots
            // produce unreliable A/D counts and would corrupt the McClellan EMA seed state.
            const isMarketOpen = this._isMarketOpenCached();
            if (!isWeekend && isMarketOpen) {
                const updateHistory = (arr, entry, maxLen) => {
                    const existing = arr.find(h => h.date === today);
                    if (existing) Object.assign(existing, entry);
                    else { arr.push({ date: today, ...entry }); if (arr.length > maxLen) arr.shift(); }
                };
                updateHistory(bd.netHighLowHistory, { net: netHighLow, highs: newHighs, lows: newLows }, 60);
                const _adTotal = advancers + decliners;
                const _netAD = _adTotal > 0 ? parseFloat(((advancers - decliners) / _adTotal * 1000).toFixed(4)) : 0;
                updateHistory(bd.adHistory, { advances: advancers, declines: decliners, netAD: _netAD }, 60);
            }

            this._computeNetHighLowSignal();
            this._computeMcClellan();
            this.save();
            return true;
        },

        async _fetch52WeekData(headers, components, snapData) {
            const end = new Date(), start = new Date();
            start.setFullYear(start.getFullYear() - 1);
            const startStr = start.toISOString().split('T')[0];
            const endStr = end.toISOString().split('T')[0];
            const batchSize = 50;

            // dateAbove5[date] = { above: N, total: N } — built across all batches
            const dateAbove5 = {};
            // dateGt4[date] = { up: N, dn: N } — stocks with |changePct| > 4% per day
            const dateGt4 = {};

            for (let i = 0; i < components.length; i += batchSize) {
                const batch = components.slice(i, i + batchSize);
                try {
                    let url = `https://data.alpaca.markets/v2/stocks/bars?symbols=${batch.join(',')}&timeframe=1Day&start=${startStr}&end=${endStr}&limit=10000&adjustment=split&sort=asc`;
                    let allBars = {};
                    let pageToken = null, pages = 0;
                    do {
                        let fetchUrl = pageToken ? `${url}&page_token=${pageToken}` : url;
                        let res = await fetch(fetchUrl, { headers });
                        if (res.status === 403) res = await fetch(`${fetchUrl}&feed=iex`, { headers });
                        if (!res.ok) break;
                        const data = await res.json();
                        if (data.bars) {
                            Object.entries(data.bars).forEach(([sym, bars]) => {
                                if (!allBars[sym]) allBars[sym] = [];
                                allBars[sym] = allBars[sym].concat(bars);
                            });
                        }
                        pageToken = data.next_page_token || null;
                        pages++;
                    } while (pageToken && pages < 10);

                    batch.forEach(sym => {
                        const bars = allBars[sym];
                        if (!bars || !bars.length) return;
                        const sortedBars = bars.sort((a, b) => a.t.localeCompare(b.t));
                        const priorBars = sortedBars.length > 1 ? sortedBars.slice(0, -1) : sortedBars;
                        let priorHigh = -Infinity, priorLow = Infinity;
                        priorBars.forEach(b => { if (b.h > priorHigh) priorHigh = b.h; if (b.l < priorLow) priorLow = b.l; });
                        // Always write 52w ranges — create a stub entry if the snapshot fetch
                        // didn't produce one (e.g. pre-market, no dailyBar yet). This ensures
                        // priorHigh52w is always stored in bd.snapshots for quick-poll merges.
                        if (!snapData[sym]) snapData[sym] = { price: 0, prevClose: 0, dailyHigh: 0, dailyLow: 0, advancing: false };
                        snapData[sym].priorHigh52w = priorHigh === -Infinity ? null : priorHigh;
                        snapData[sym].priorLow52w = priorLow === Infinity ? null : priorLow;
                        snapData[sym].high52w = priorHigh !== -Infinity ? Math.max(priorHigh, snapData[sym].dailyHigh || 0) : null;
                        snapData[sym].low52w  = priorLow  !== Infinity  ? Math.min(priorLow,  snapData[sym].dailyLow  || 0) : null;
                        // Today's 5 SMA (last 5 bars including today)
                        const last5 = sortedBars.slice(-5).map(b => b.c);
                        if (last5.length === 5) {
                            const sma5 = last5.reduce((a, b) => a + b, 0) / 5;
                            snapData[sym].sma5 = sma5;
                            if (snapData[sym].price > 0) snapData[sym].aboveSma5 = snapData[sym].price > sma5;
                        }
                        // Historical % above 5 SMA: walk every bar from index 4 onward
                        for (let j = 4; j < sortedBars.length; j++) {
                            const bar = sortedBars[j];
                            const date = bar.t.slice(0, 10);
                            const dow = new Date(date + 'T12:00:00Z').getUTCDay();
                            if (dow === 0 || dow === 6) continue;
                            const sma5 = (sortedBars[j-4].c + sortedBars[j-3].c + sortedBars[j-2].c + sortedBars[j-1].c + bar.c) / 5;
                            if (!dateAbove5[date]) dateAbove5[date] = { above: 0, total: 0 };
                            dateAbove5[date].total++;
                            if (bar.c > sma5) dateAbove5[date].above++;
                        }
                        // GT4: walk bars from index 1 onward (need prev close)
                        for (let j = 1; j < sortedBars.length; j++) {
                            const bar = sortedBars[j];
                            const date = bar.t.slice(0, 10);
                            const dow = new Date(date + 'T12:00:00Z').getUTCDay();
                            if (dow === 0 || dow === 6) continue;
                            const prevClose = sortedBars[j-1].c;
                            if (prevClose <= 0) continue;
                            const chgPct = (bar.c - prevClose) / prevClose * 100;
                            if (!dateGt4[date]) dateGt4[date] = { up: 0, dn: 0, total: 0 };
                            dateGt4[date].total++;
                            if (chgPct > 4)  dateGt4[date].up++;
                            if (chgPct < -4) dateGt4[date].dn++;
                        }
                    });
                } catch (e) { console.warn(`52w batch ${i} failed:`, e); }
            }

            // Convert dateAbove5 map to sorted history array (require >=50 stocks for reliability)
            const builtHistory = Object.keys(dateAbove5).sort()
                .filter(date => dateAbove5[date].total >= 50)
                .map(date => ({
                    date,
                    pct: parseFloat(((dateAbove5[date].above / dateAbove5[date].total) * 100).toFixed(1))
                }));

            // Convert dateGt4 map to sorted stMomentum history (last 60 trading days, >=50 stocks)
            const stMomentumHistory = Object.keys(dateGt4).sort()
                .filter(date => dateGt4[date].total >= 50)
                .slice(-60)
                .map(date => {
                    const { up, dn } = dateGt4[date];
                    const ratio = up / Math.max(1, dn);
                    return { date, up, dn, ratio, logRatio: Math.log(Math.max(0.01, ratio)) };
                });

            return { builtHistory, stMomentumHistory };
        },

        // =====================================================================
        // McCLELLAN CALCULATIONS
        // =====================================================================
        _computeNetHighLowSignal() {
            const tm = this.data.settings.trendMap;
            const bd = this.data.settings.breadthData;
            if (!tm || !bd) return;
            // Use the live computed netHighLow if available (always current regardless of market hours).
            // Fall back to the tail of history only if we haven't run a breadth fetch yet.
            if (bd.netHighLow !== undefined && bd.netHighLow !== null) {
                tm.signals.p6_net_52wk_positive = bd.netHighLow > 0;
            } else {
                const history = bd.netHighLowHistory;
                if (!history || history.length === 0) return;
                tm.signals.p6_net_52wk_positive = history[history.length - 1].net > 0;
            }
        },

        // Returns netHighLowHistory merged with today's live reading so charts
        // always show the current value even outside market hours.
        _getHlHistory(bd) {
            let history = (bd?.netHighLowHistory || []).slice();
            if (bd?.netHighLow !== undefined && bd?.netHighLow !== null) {
                const todayStr = new Date().toISOString().split('T')[0];
                const last = history[history.length - 1];
                if (!last || last.date < todayStr) {
                    history = [...history, { date: todayStr, net: bd.netHighLow, highs: bd.newHighs || 0, lows: bd.newLows || 0 }];
                } else if (last.date === todayStr) {
                    // Replace stale baseline snapshot with live value
                    history = [...history.slice(0, -1), { date: todayStr, net: bd.netHighLow, highs: bd.newHighs || 0, lows: bd.newLows || 0 }];
                }
            }
            return history;
        },

        _getMcsiRecentHistory(mc, bd) {
            const values = [];
            const baseline = bd.baseline;
            if (baseline && baseline.dailySeries && baseline.dailySeries.length > 0) {
                const series = baseline.dailySeries;
                const startIdx = Math.max(0, series.length - 20);
                for (let i = startIdx; i < series.length; i++) values.push(series[i].summationIndex);
                const baselineDate = baseline.lastState.date;
                // Use >= so today's live A/D replaces the baseline's end-of-day snapshot.
                // Pop the last baseline value first to avoid a duplicate entry for the same date.
                const newDays = bd.adHistory.filter(d => d.date >= baselineDate);
                if (newDays.length > 0) {
                    // If the first new day matches the baseline's last date, remove the
                    // already-pushed baseline value so it gets replaced by the live computation.
                    if (newDays[0].date === baselineDate && values.length > 0) values.pop();
                    const k19 = 2 / 20, k39 = 2 / 40;
                    let ema19 = baseline.lastState.ema19, ema39 = baseline.lastState.ema39, si = baseline.lastState.summationIndex;
                    newDays.forEach(day => {
                        ema19 = (day.netAD * k19) + (ema19 * (1 - k19));
                        ema39 = (day.netAD * k39) + (ema39 * (1 - k39));
                        si += (ema19 - ema39);
                        values.push(parseFloat(si.toFixed(4)));
                    });
                }
            } else {
                if (mc.prevSummationIndex !== null) values.push(mc.prevSummationIndex);
                if (mc.summationIndex !== null) values.push(mc.summationIndex);
            }
            return values;
        },

        _computeMcClellan() {
            const tm = this.data.settings.trendMap;
            const bd = this.data.settings.breadthData;
            if (!tm || !bd) return;

            const k19 = 2 / 20, k39 = 2 / 40;
            const mc = bd.mcclellan;
            const baseline = bd.baseline;

            if (baseline && baseline.lastState) {
                let ema19 = baseline.lastState.ema19, ema39 = baseline.lastState.ema39;
                let summationIndex = baseline.lastState.summationIndex, prevSummationIndex = summationIndex;
                let oscillator = baseline.lastState.oscillator;

                // Store the baseline's own anchored values — these are server-computed,
                // SIP-consolidated, and identical on every device.
                mc.baselineOscillator = parseFloat(oscillator.toFixed(4));
                mc.baselineSummationIndex = parseFloat(summationIndex.toFixed(4));
                mc.baselineDate = baseline.lastState.date;

                // Use >= so today's live A/D overrides the baseline's end-of-day snapshot
                const newDays = bd.adHistory.filter(d => d.date >= baseline.lastState.date);
                // Track whether we actually have live intraday data beyond the baseline
                mc.hasLiveExtension = newDays.length > 0;
                newDays.forEach(day => {
                    ema19 = (day.netAD * k19) + (ema19 * (1 - k19));
                    ema39 = (day.netAD * k39) + (ema39 * (1 - k39));
                    oscillator = ema19 - ema39;
                    prevSummationIndex = summationIndex;
                    summationIndex += oscillator;
                });
                mc.ema19 = parseFloat(ema19.toFixed(6));
                mc.ema39 = parseFloat(ema39.toFixed(6));
                mc.oscillator = parseFloat(oscillator.toFixed(4));
                mc.prevSummationIndex = parseFloat(prevSummationIndex.toFixed(4));
                mc.summationIndex = parseFloat(summationIndex.toFixed(4));
            } else {
                const adData = bd.adHistory;
                if (!adData || adData.length < 20) return;
                let ema19 = null, ema39 = null, summationIndex = 0, prevSummationIndex = 0, oscillator = 0;
                adData.forEach((day, i) => {
                    const netAD = day.netAD;
                    if (i === 0) { ema19 = netAD; ema39 = netAD; }
                    else { ema19 = (netAD * k19) + (ema19 * (1 - k19)); ema39 = (netAD * k39) + (ema39 * (1 - k39)); }
                    oscillator = ema19 - ema39;
                    prevSummationIndex = summationIndex;
                    summationIndex += oscillator;
                });
                mc.ema19 = parseFloat(ema19.toFixed(6));
                mc.ema39 = parseFloat(ema39.toFixed(6));
                mc.oscillator = parseFloat(oscillator.toFixed(4));
                mc.prevSummationIndex = parseFloat(prevSummationIndex.toFixed(4));
                mc.summationIndex = parseFloat(summationIndex.toFixed(4));
            }

            // MCSI Signal
            const siHistory = this._getMcsiRecentHistory(mc, bd);
            if (siHistory.length >= 12) {
                const len = siHistory.length;
                let sma10Today = 0, sma10Yesterday = 0;
                for (let j = len - 10; j < len; j++) sma10Today += siHistory[j];
                sma10Today /= 10;
                for (let j = len - 11; j < len - 1; j++) sma10Yesterday += siHistory[j];
                sma10Yesterday /= 10;
                const aboveSma = siHistory[len - 1] > sma10Today;
                const mcsiRising = siHistory[len - 1] > siHistory[len - 2];
                const smaRising = sma10Today > sma10Yesterday;
                let consecutiveRising = 0;
                for (let j = len - 1; j >= 1; j--) { if (siHistory[j] > siHistory[j - 1]) consecutiveRising++; else break; }

                let mcsiSignal;
                if (aboveSma && mcsiRising && smaRising) mcsiSignal = 'YES';
                else if (!aboveSma && consecutiveRising >= 2) mcsiSignal = 'ATTEMPT';
                else mcsiSignal = 'NO';

                mc.mcsiUptrend = mcsiSignal === 'YES';
                mc._mcsiConsecutiveRising = consecutiveRising;
                if (mcsiSignal === 'YES') tm.signals.p5_mcsi_uptrend = true;
                else if (mcsiSignal === 'ATTEMPT') tm.signals.p5_mcsi_uptrend = 'ATTEMPT';
                else tm.signals.p5_mcsi_uptrend = false;
            } else {
                mc.mcsiUptrend = mc.summationIndex > mc.prevSummationIndex;
                tm.signals.p5_mcsi_uptrend = mc.mcsiUptrend;
            }

            const threshold = mc.overboughtThreshold || 7;
            mc.isOverbought = mc.oscillator >= threshold;
            tm.signals.p7_mco_out_overbought = mc.oscillator < threshold;
        },

        // Returns { oscStr, siStr, isLive } for display.
        // When market is closed (or no live extension exists), anchors to the
        // server-computed baseline values so all devices show the same number.
        // When market is open and live data has been fetched, shows the
        // client-computed estimate prefixed with "~" to signal approximation.
        _getMcDisplay() {
            const bd = this.data.settings.breadthData;
            const mc = bd?.mcclellan || {};
            const marketOpen = this._isMarketOpenCached();
            const useLive = marketOpen && mc.hasLiveExtension;

            const osc = useLive ? mc.oscillator : (mc.baselineOscillator ?? mc.oscillator ?? 0);
            const si  = useLive ? mc.summationIndex : (mc.baselineSummationIndex ?? mc.summationIndex ?? 0);
            const oscStr = `${osc > 0 ? '+' : ''}${osc.toFixed(2)}`;
            const siStr  = `${si  > 0 ? '+' : ''}${si.toFixed(1)}`;
            return { oscStr, siStr, osc, si, isLive: useLive };
        },

        _buildMcClellanSeries() {
            const bd = this.data.settings.breadthData;
            if (!bd) return [];
            let series = [];
            // Reset incomplete flag — will be set below if gap can't be closed
            this._seriesIncomplete = false;
            const baseline = bd.baseline;
            if (baseline && baseline.dailySeries && baseline.dailySeries.length > 0) {
                series = baseline.dailySeries.slice();
                const baselineEndDate = baseline.lastState.date;

                // --- Gap-fill: if baseline is stale, try to bridge missing days
                //     from adHistory before appending live days ---
                const adHistory = bd.adHistory || [];
                // Use >= so today's live A/D replaces the baseline's end-of-day snapshot
                const gapDays = adHistory.filter(d => d.date >= baselineEndDate);

                if (gapDays.length > 0) {
                    // Check whether adHistory actually covers the full gap to today.
                    // «Today» here means the most recent adHistory entry we have.
                    const adHistoryStart = adHistory[0]?.date || '';
                    const gapStart = baselineEndDate;
                    // If the gap start is before adHistory's earliest entry, some
                    // days are unrecoverable — flag as incomplete.
                    if (adHistoryStart > gapStart) {
                        // adHistory doesn't reach back far enough to bridge the gap
                        this._seriesIncomplete = true;
                        console.warn(`Chart gap: baseline ends ${gapStart}, adHistory starts ${adHistoryStart} — ${Math.round((new Date(adHistoryStart) - new Date(gapStart)) / 86400000)} days unrecoverable`);
                    }

                    const k19 = 2 / 20, k39 = 2 / 40;
                    let ema19 = baseline.lastState.ema19, ema39 = baseline.lastState.ema39, si = baseline.lastState.summationIndex;
                    // If the first gapDay matches the baseline's last date, remove that
                    // date from the series first so it gets replaced by the live value.
                    if (gapDays[0].date === baselineEndDate) {
                        const lastIdx = series.length - 1;
                        if (lastIdx >= 0 && series[lastIdx].date === baselineEndDate) series.pop();
                    }
                    gapDays.forEach(day => {
                        ema19 = (day.netAD * k19) + (ema19 * (1 - k19));
                        ema39 = (day.netAD * k39) + (ema39 * (1 - k39));
                        const osc = ema19 - ema39;
                        si += osc;
                        series.push({ date: day.date, advances: day.advances, declines: day.declines, netAD: day.netAD, ema19: parseFloat(ema19.toFixed(4)), ema39: parseFloat(ema39.toFixed(4)), oscillator: parseFloat(osc.toFixed(4)), summationIndex: parseFloat(si.toFixed(4)) });
                    });
                }
            } else if (bd.adHistory && bd.adHistory.length > 0) {
                const k19 = 2 / 20, k39 = 2 / 40;
                let ema19 = 0, ema39 = 0, si = 0;
                bd.adHistory.forEach((day, i) => {
                    if (i === 0) { ema19 = day.netAD; ema39 = day.netAD; }
                    else { ema19 = (day.netAD * k19) + (ema19 * (1 - k19)); ema39 = (day.netAD * k39) + (ema39 * (1 - k39)); }
                    const osc = ema19 - ema39;
                    si += osc;
                    series.push({ date: day.date, advances: day.advances, declines: day.declines, netAD: day.netAD, ema19: parseFloat(ema19.toFixed(4)), ema39: parseFloat(ema39.toFixed(4)), oscillator: parseFloat(osc.toFixed(4)), summationIndex: parseFloat(si.toFixed(4)) });
                });
            }
            return series;
        },

        // =====================================================================

        _openMcClellanDetail() {

            let bars = '';
            miniSeries.forEach((s, i) => {
                const x = 5 + i * (barW + 0.5);

            // MCSI line
            const siValues = miniSeries.map(s => s.summationIndex);
            const minSi = Math.min(...siValues), maxSi = Math.max(...siValues);
            const siRange = maxSi - minSi || 1;

            const dateLabels = [];

                dateLabels.push(`<text x="${x}" y="${chartH + 10}" fill="#475569" font-size="6" text-anchor="middle">${miniSeries[i].date.slice(5)}</text>`);
            }

            const recentDays = series.slice(-10);
            const adTableRows = recentDays.map(s => {
                const oscC = s.oscillator > 0 ? 'color:#6ee7b7' : 'color:#f87171';
                const siC = s.summationIndex > 0 ? 'color:#6ee7b7' : 'color:#f87171';
                return `<div class="grid grid-cols-6 gap-1 text-[9px] font-mono py-0.5 border-b border-slate-800/30">
                    <span class="text-slate-500">${s.date.slice(5)}</span>

                    <span style="color:#f87171" class="text-right">${s.declines}</span>
                    <span class="text-right" style="${s.netAD > 0 ? 'color:#6ee7b7' : 'color:#f87171'}">${s.netAD > 0 ? '+' : ''}${s.netAD}</span>
                    <span class="text-right" style="${oscC}">${s.oscillator > 0 ? '+' : ''}${s.oscillator.toFixed(2)}</span>
                    <span class="text-right" style="${siC}">${s.summationIndex.toFixed(0)}</span>
                </div>`;
            }).join('');

            const mcDisp = this._getMcDisplay();
            const oscColor = mcDisp.osc > 0 ? '#6ee7b7' : '#f87171';
            const siColor  = mcDisp.si  > 0 ? '#6ee7b7' : '#f87171';
            const baselineStatus = bd.baseline ? `<span style="color:#6ee7b7">Baseline loaded</span> (${bd.baseline.tradingDays} days)` : '<span style="color:#fbbf24">No baseline — local data only</span>';

            // ── 52-Week H/L Oscillator mini chart ──

                });

                // Date labels

                for (let i = 0; i < hlHistory.length; i += hlStep) {

                const latestHL = hlHistory[hlHistory.length - 1];

                hlChartHtml = `
                    <div>

                            <span class="text-[8px] text-blue-400 cursor-pointer hover:underline" onclick="app._openExpandedChart('hl52')">Expand ↗</span>
                        </div>
                        <div class="bg-slate-900 rounded-lg p-2 border border-slate-700 cursor-pointer hover:border-slate-600 transition-colors" onclick="app._openExpandedChart('hl52')">
                            <svg viewBox="0 0 ${hlChartW} ${hlChartH + 14}" class="w-full" style="height:${hlChartH + 14}px">
                                <line x1="0" y1="${hlMidY}" x2="${hlChartW}" y2="${hlMidY}" stroke="#334155" stroke-width="0.5"/>
                                ${hlBars}
                                ${hlDateLabels}
                            </svg>
                            <div class="flex justify-between text-[8px] font-mono mt-0.5">
                                <span style="color:${latestHLColor}" class="font-bold">${latestHLStr}</span>
                                <div class="flex gap-3 text-slate-600"><span style="color:#34d399">▌</span>Net Highs <span style="color:#f87171">▌</span>Net Lows</div>
                            </div>
                        </div>
                    </div>`;
            } else {
                hlChartHtml = `
                    <div>
                        <div class="text-[9px] text-slate-500 uppercase font-bold mb-1">52-Week H/L Oscillator</div>
                        <div class="bg-slate-900 rounded-lg p-2 border border-slate-700 text-center text-[9px] text-slate-600 py-4">Accumulating history — refresh daily to build data</div>
                    </div>`;
            }

            // ── % of Stocks Above 5 SMA mini chart ──
            // Defensive: reload from isolated key if in-memory history is empty
            if (!bd.pctAbove5smaHistory || bd.pctAbove5smaHistory.length === 0) {
                bd.pctAbove5smaHistory = this._loadSma5History();
            }
            const sma5History = (bd.pctAbove5smaHistory || []).slice(-60);
            const todayStr = new Date().toISOString().split('T')[0];
            const liveSma5 = bd.pctAbove5sma;
            // Build display array — replace or append today's live value
            let sma5Display = sma5History.map(s => ({ ...s })); // deep-copy entries
            if (liveSma5 !== null && liveSma5 !== undefined) {
                const lastEntry = sma5Display[sma5Display.length - 1];
                if (!lastEntry || lastEntry.date !== todayStr) {
                    sma5Display = [...sma5Display, { date: todayStr, pct: liveSma5 }];
                } else {
                    lastEntry.pct = liveSma5; // safe now — entries are copies
                }
            }
            let sma5ChartHtml = '';
            if (sma5Display.length >= 1) {
                const sma5W = 340, sma5H = 80;
                // Compute Y range from the FINAL merged array (includes liveSma5)
                const pctValues = sma5Display.map(s => s.pct);
                const dataMin = Math.min(...pctValues);
                const dataMax = Math.max(...pctValues);
                const minPct = Math.max(0,   dataMin - 10);
                const maxPct = Math.min(100, dataMax + 10);
                const pctRange = Math.max(20, maxPct - minPct);
                const toSmaY = (v) => sma5H - 4 - ((v - minPct) / pctRange * (sma5H - 8));
                const toSmaX = (i) => 5 + (sma5Display.length > 1 ? (i / (sma5Display.length - 1)) : 0.5) * (sma5W - 10);
                const obY = toSmaY(75), osY = toSmaY(25);
                let sma5Path = '';
                sma5Display.forEach((s, i) => { sma5Path += (i === 0 ? 'M' : 'L') + `${toSmaX(i).toFixed(1)},${toSmaY(s.pct).toFixed(1)}`; });
                const latestSma5 = sma5Display[sma5Display.length - 1].pct;
                const sma5LineColor = latestSma5 >= 75 ? '#f87171' : latestSma5 <= 25 ? '#6ee7b7' : '#a78bfa';
                const sma5Step = Math.max(1, Math.floor(sma5Display.length / 5));
                let sma5DateLabels = '';
                for (let i = 0; i < sma5Display.length; i += sma5Step) {
                    sma5DateLabels += `<text x="${toSmaX(i).toFixed(1)}" y="${sma5H + 10}" fill="#475569" font-size="6" text-anchor="middle">${sma5Display[i].date.slice(5)}</text>`;
                }
                const obInRange = obY > 0 && obY < sma5H;
                const osInRange = osY > 0 && osY < sma5H;
                const y100 = toSmaY(100), y0 = toSmaY(0);
                const y50 = toSmaY(50);

                sma5ChartHtml = `
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <div class="text-[9px] text-slate-500 uppercase font-bold">% of Stocks Above 5 SMA</div>
                            <div class="flex items-center gap-2">
                                <span class="text-[10px] font-bold font-mono" style="color:${sma5LineColor}">${latestSma5.toFixed(1)}%</span>
                                <span class="text-[8px] text-blue-400 cursor-pointer hover:underline" onclick="app._openExpandedChart('sma5')">Expand ↗</span>
                            </div>
                        </div>
                        <div class="bg-slate-900 rounded-lg p-2 border border-slate-700 cursor-pointer hover:border-slate-600 transition-colors" onclick="app._openExpandedChart('sma5')">
                            <svg viewBox="0 0 ${sma5W} ${sma5H + 14}" class="w-full" style="height:${sma5H + 14}px">
                                ${obInRange ? `<rect x="5" y="${Math.max(y100,0).toFixed(1)}" width="${sma5W-10}" height="${(obY - Math.max(y100,0)).toFixed(1)}" fill="rgba(248,113,113,0.06)"/>` : ''}
                                ${osInRange ? `<rect x="5" y="${osY.toFixed(1)}" width="${sma5W-10}" height="${(Math.min(y0,sma5H) - osY).toFixed(1)}" fill="rgba(110,231,183,0.06)"/>` : ''}
                                ${obInRange ? `<line x1="5" y1="${obY.toFixed(1)}" x2="${sma5W-5}" y2="${obY.toFixed(1)}" stroke="#f87171" stroke-width="0.7" stroke-dasharray="3,2" opacity="0.7"/><text x="${sma5W-7}" y="${(obY-2).toFixed(1)}" fill="#f87171" font-size="6" text-anchor="end" opacity="0.85">OB 75</text>` : ''}
                                ${osInRange ? `<line x1="5" y1="${osY.toFixed(1)}" x2="${sma5W-5}" y2="${osY.toFixed(1)}" stroke="#6ee7b7" stroke-width="0.7" stroke-dasharray="3,2" opacity="0.7"/><text x="${sma5W-7}" y="${(osY-2).toFixed(1)}" fill="#6ee7b7" font-size="6" text-anchor="end" opacity="0.85">OS 25</text>` : ''}
                                ${(y50 > 0 && y50 < sma5H) ? `<line x1="5" y1="${y50.toFixed(1)}" x2="${sma5W-5}" y2="${y50.toFixed(1)}" stroke="#475569" stroke-width="0.4" opacity="0.5"/>` : ''}
                                <path d="${sma5Path}" fill="none" stroke="${sma5LineColor}" stroke-width="1" stroke-linejoin="round"/>
                                ${sma5DateLabels}
                            </svg>
                            <div class="flex justify-between text-[8px] font-mono mt-0.5">
                                <span style="color:#6ee7b7;opacity:0.7">OS ≤ 25</span>
                                <span class="text-slate-600">50</span>
                                <span style="color:#f87171;opacity:0.7">OB ≥ 75</span>
                            </div>
                        </div>

            } else {
                sma5ChartHtml = `
                    <div>
                        <div class="text-[9px] text-slate-500 uppercase font-bold mb-1">% of Stocks Above 5 SMA</div>
                        <div class="bg-slate-900 rounded-lg p-2 border border-slate-700 text-center text-[9px] text-slate-600 py-4">${liveSma5 !== null && liveSma5 !== undefined ? `Current: ${liveSma5.toFixed(1)}% — refresh daily to build history` : 'Accumulating history — refresh daily to build data'}</div>
                    </div>`;
            }

            // ── BIG WAVE MOMENTUM Score ──
            // DAY RATIO = stocks up >4% / stocks down <-4% (ST Momentum ratio)
            // Normalization context: 60-day stMomentumHistory built during full bar fetch
            // Live gt4 counts: updated every 60s via quick poll (bd.liveUpGt4 / bd.liveDnGt4)
            let gdbHtml = '';
            (() => {
                const normalize = (val, arr) => {
                    const mn = Math.min(...arr), mx = Math.max(...arr);
                    if (mx === mn) return 0.5;
                    return Math.max(0, Math.min(1, (val - mn) / (mx - mn)));
                };

                // Live gt4 counts — prefer stored live values, fall back to computing from snapshots
                const snaps = bd.snapshots || {};
                let upGt4 = bd.liveUpGt4, dnGt4 = bd.liveDnGt4;
                if (upGt4 === undefined || dnGt4 === undefined) {
                    upGt4 = 0; dnGt4 = 0;
                    Object.values(snaps).forEach(s => {
                        const chg = s.changePct || 0;
                        if (chg > 4)  upGt4++;
                        if (chg < -4) dnGt4++;
                    });
                }
                const dayRatio = upGt4 / Math.max(dnGt4, Math.ceil(upGt4 * 0.1), 1);
                const logToday = Math.log(Math.max(0.01, dayRatio));

                // Normalization context: use real stMomentumHistory if available, else A/D proxy
                const stHist = bd.stMomentumHistory || [];
                const adSeries = series.slice(-60);
                let logArr;
                if (stHist.length >= 5) {
                    logArr = [...stHist.map(d => d.logRatio), logToday];
                } else if (adSeries.length >= 5) {
                    // Fallback: derive log ratios from A/D series as proxy
                    logArr = [...adSeries.map(s => Math.log(Math.max(0.01, (s.advances||1)/(s.declines||1)))), logToday];
                } else {
                    gdbHtml = ''; return;
                }

                // w1: log(DAY RATIO) — 65%
                const w1 = normalize(logToday, logArr);

                // w2: A/D Net Ratio — 15%
                const todayAD = adSeries.length ? adSeries[adSeries.length - 1] : null;
                const adv = todayAD?.advances || 0, dec = todayAD?.declines || 1;
                const net = todayAD?.netAD || 0, total = adv + dec || 1;
                const netRatios = adSeries.map(s => (s.netAD||0) / ((s.advances||0)+(s.declines||1)));
                const w2 = normalize(net / total, [...netRatios, net / total]);

                // w3: % Above 5 SMA — 12%
                const sma5Val = liveSma5 !== null && liveSma5 !== undefined ? liveSma5 : null;
                const sma5Hist = (bd.pctAbove5smaHistory || []).slice(-60).map(s => s.pct);
                let w3 = 0.5;
                if (sma5Val !== null && sma5Hist.length >= 3) {
                    w3 = normalize(sma5Val, [...sma5Hist, sma5Val]);
                } else if (sma5Val !== null) {
                    w3 = normalize(sma5Val, [0, 50, 100]);
                }

                // w4: MCO direction — 8%
                const oscVals = adSeries.map(s => s.oscillator || 0);
                const w4 = todayAD && oscVals.length ? normalize(todayAD.oscillator || 0, oscVals) : 0.5;

                // Composite [0..1] → display [-100..+100]
                const gdb = w1 * 0.65 + w2 * 0.15 + w3 * 0.12 + w4 * 0.08;
                const gdbScore = parseFloat(((gdb * 200) - 100).toFixed(1));

                const gdbColor  = gdbScore >= 20 ? '#34d399' : gdbScore <= -20 ? '#f87171' : '#fbbf24';
                const gdbBg     = gdbScore >= 20 ? 'rgba(52,211,153,0.07)' : gdbScore <= -20 ? 'rgba(248,113,113,0.07)' : 'rgba(251,191,36,0.07)';
                const gdbBorder = gdbScore >= 20 ? 'rgba(52,211,153,0.3)'  : gdbScore <= -20 ? 'rgba(248,113,113,0.3)'  : 'rgba(251,191,36,0.3)';
                const gdbLabel  = gdbScore >= 60 ? 'VERY STRONG' : gdbScore >= 20 ? 'STRONG' : gdbScore >= -20 ? 'NEUTRAL' : gdbScore >= -40 ? 'WEAK' : 'VERY WEAK';
                const contextNote = stHist.length >= 5 ? `${stHist.length}d context` : 'A/D proxy';

                // Gauge — half-dial, self-contained, no overflow
                // Semi-circle: startAng=-180 (left), endAng=0 (right), sweep=180°
                // cx centred, cy at bottom so arc fits fully in viewBox
                const gW = 130, gH = 72;
                const r = 44;
                const cx = gW / 2, cy = gH - 10; // bottom margin for tick labels
                const startAng = -180, endAng = 0, sweepDeg = 180;
                const toRad = a => a * Math.PI / 180;
                const px = (a, rad) => cx + rad * Math.cos(toRad(a));
                const py = (a, rad) => cy + rad * Math.sin(toRad(a));
                const arc = (a1, a2, rad) => {
                    const large = (a2 - a1) > 180 ? 1 : 0;
                    return `M ${px(a1,rad).toFixed(2)} ${py(a1,rad).toFixed(2)} A ${rad} ${rad} 0 ${large} 1 ${px(a2,rad).toFixed(2)} ${py(a2,rad).toFixed(2)}`;
                };
                const needleAngle = startAng + gdb * sweepDeg;
                const nX = px(needleAngle, r - 6), nY = py(needleAngle, r - 6);

                // 5 tick marks along the arc
                const tickAng = [-180, -135, -90, -45, 0];
                const tickLbl = ['-100', '-50', '0', '+50', '+100'];
                let ticks = '';
                tickAng.forEach((ta, ti) => {
                    const tx1=px(ta,r+2), ty1=py(ta,r+2);
                    const tx2=px(ta,r-2), ty2=py(ta,r-2);
                    const tlx=px(ta,r+9),  tly=py(ta,r+9);
                    ticks += `<line x1="${tx1.toFixed(1)}" y1="${ty1.toFixed(1)}" x2="${tx2.toFixed(1)}" y2="${ty2.toFixed(1)}" stroke="#334155" stroke-width="1"/>`;
                    ticks += `<text x="${tlx.toFixed(1)}" y="${(tly+1.5).toFixed(1)}" fill="#475569" font-size="4.5" text-anchor="middle">${tickLbl[ti]}</text>`;
                });

                gdbHtml = `
                    <div style="background:${gdbBg};border:1px solid ${gdbBorder};border-radius:8px;padding:10px 14px;">
                        <div style="font-size:8px;color:#64748b;text-transform:uppercase;font-weight:700;letter-spacing:0.08em;margin-bottom:8px;">Today's Breadth Power</div>
                        <div style="display:flex;align-items:center;justify-content:center;gap:16px;">
